# Pulse CodeQL — static analysis for Go and JavaScript/TypeScript.
# Runs on every push/PR to main, weekly on Mondays, and on demand.
name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '31 3 * * 1'
  workflow_dispatch:

# Principle of least privilege: read-only at the top level; the analyze
# job elevates only what it needs to upload SARIF results.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      security-events: write
      contents: read
      actions: read

    strategy:
      fail-fast: false
      # Per-language build modes: the Go extractor does NOT support
      # build-mode none (proven by the first run, 2026-07-09: "Go does not
      # support the none build mode") — it needs autobuild, which locates and
      # builds every go.mod in the tree (server/, qa/mock-ams, qa/licensegen).
      # javascript-typescript extracts without a build.
      matrix:
        include:
          - language: go
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none

    steps:
      - uses: actions/checkout@v4

      # Go autobuild compiles the modules, so it needs the toolchain matching
      # go.mod (go 1.25.0) — the runner default can lag behind.
      - uses: actions/setup-go@v6
        if: matrix.language == 'go'
        with:
          go-version: "1.25"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
