# AMS compatibility matrix — verifies the collector normalizer + amsclient handle
# the AMS REST v2 wire format across supported AMS versions. Direct mitigation for
# PRD §7.13 risk "AMS API/log format changes across versions". Runs nightly + on
# collector/amsclient changes.
#
# D-044: rewritten. The previous version pulled `antmedia/ant-media-server-community:<ver>`
# docker images and stood up ClickHouse — but (a) those public image tags no longer exist
# (Docker Hub returns 404 for every tag AND the repo), so every leg silently fell back to
# mock-ams, making the "version matrix" fictional; (b) it built `./server/cmd/pulse/` from the
# repo ROOT where there is no go.mod (the module is at server/), so the build step failed
# outright and the job had never actually run; (c) ClickHouse + `pulse migrate` were set up but
# the collector matrix tests need neither. Per-version wire-format differences are covered
# in-process by TestAMSVersionMatrix's built-in mock profiles (see
# server/internal/collector/ams_version_matrix_test.go), so this workflow now runs those
# (no Docker, no ClickHouse) plus a REST v2 contract smoke against the mock-ams binary.
# When a pullable/authenticated real-AMS image becomes available, add a container-backed job.
name: ams-version-matrix

on:
  schedule:
    - cron: "0 3 * * *"
  pull_request:
    paths:
      - "server/pkg/amsclient/**"
      - "server/internal/collector/**"
      - "qa/mock-ams/**"
      - "contracts/events/ams-server-event.schema.json"
      - ".github/workflows/ams-version-matrix.yml"
  workflow_dispatch:

jobs:
  matrix-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Match ci.yml (project standardized on 1.25 — D-032).
          go-version: "1.25"

      - name: Build binaries (module-local — pulse and mock-ams have separate go.mod)
        run: |
          (cd server && CGO_ENABLED=0 go build -o /tmp/pulse ./cmd/pulse/) && echo "pulse built"
          (cd qa/mock-ams && CGO_ENABLED=0 go build -o /tmp/mock-ams .) && echo "mock-ams built"

      - name: AMS wire-format matrix tests (collector normalizer + amsclient, mock profiles)
        run: |
          cd server
          CGO_ENABLED=0 go test \
            -run 'TestAMSVersionMatrix|TestCollector' \
            ./internal/collector/... ./pkg/amsclient/... \
            -v -timeout 120s

      - name: REST v2 contract smoke against mock-ams
        run: |
          /tmp/mock-ams -addr :5080 -scenario 1 &
          MOCK_PID=$!
          for _ in $(seq 1 15); do
            curl -sf "http://localhost:5080/rest/v2/applications" > /dev/null 2>&1 && break
            sleep 1
          done
          FAIL=0

          echo "Testing /rest/v2/applications..."
          if curl -sf "http://localhost:5080/rest/v2/applications" | python3 -c "import sys,json; json.load(sys.stdin)" > /dev/null 2>&1; then
            echo "PASS: /rest/v2/applications returns valid JSON"
          else
            echo "FAIL: /rest/v2/applications"
            FAIL=1
          fi

          echo "Testing /rest/v2/broadcasts/live/list..."
          curl -sf "http://localhost:5080/rest/v2/broadcasts/live/list?offset=0&size=10" > /dev/null 2>&1 \
            && echo "PASS: /rest/v2/broadcasts/live/list" \
            || echo "WARN: /rest/v2/broadcasts/live/list"

          echo "Testing /rest/v2/cluster/nodes..."
          curl -sf "http://localhost:5080/rest/v2/cluster/nodes" > /dev/null 2>&1 \
            && echo "PASS: /rest/v2/cluster/nodes" \
            || echo "WARN: /rest/v2/cluster/nodes"

          kill "$MOCK_PID" 2>/dev/null || true
          [ $FAIL -eq 0 ] && echo "REST v2 contract smoke: PASS" || exit 1

      - name: Notify Slack on success
        if: success()
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title || '' }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          MSG=$(printf '%s' "$COMMIT_MESSAGE" | head -n1)
          MSG=${MSG:-"(no commit message)"}
          TEXT=$(printf '✅ Build succeeded\n\nRepo: %s\nWorkflow: %s\nTime: %s\nCommit: %s - %s' \
            "${GITHUB_REPOSITORY##*/}" "$GITHUB_WORKFLOW" "$(date -u '+%Y-%m-%d %H:%M UTC')" \
            "${GITHUB_SHA:0:7}" "$MSG")
          jq -n --arg text "$TEXT" '{text: $text}' \
            | curl -sf -X POST -H 'Content-type: application/json' --data @- \
              "$SLACK_WEBHOOK_URL" \
            || echo "::warning::Slack success notification failed"

      - name: Notify Slack on failure
        if: failure()
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title || '' }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          MSG=$(printf '%s' "$COMMIT_MESSAGE" | head -n1)
          MSG=${MSG:-"(no commit message)"}
          TEXT=$(printf '❌ Build failed\n\nRepo: %s\nWorkflow: %s\nJob: %s\nBranch: %s\nActor: %s\nCommit: %s - %s\nRun: %s\nTime: %s' \
            "${GITHUB_REPOSITORY##*/}" "$GITHUB_WORKFLOW" "$GITHUB_JOB" "$GITHUB_REF_NAME" "$GITHUB_ACTOR" \
            "${GITHUB_SHA:0:7}" "$MSG" \
            "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            "$(date -u '+%Y-%m-%d %H:%M UTC')")
          jq -n --arg text "$TEXT" '{text: $text}' \
            | curl -sf -X POST -H 'Content-type: application/json' --data @- \
              "$SLACK_WEBHOOK_URL" \
            || echo "::warning::Slack failure notification failed"
