# Pulse CI — validates contracts, builds all components, runs tests.
# Hardened: go 1.25, node 22, GHCR lowercase, no soft-fail lint, real integration tests.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── 1. Contracts ─────────────────────────────────────────────────────────────
  # Source of truth — validate first; everything else depends on this job.
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON schemas (ajv draft2020)
        run: |
          npx --yes ajv-cli compile --spec=draft2020 --strict=false \
            -s contracts/events/ams-server-event.schema.json \
            -s contracts/events/beacon-event.schema.json \
            -s contracts/events/alert-notification.schema.json
      - name: Lint OpenAPI spec (redocly)
        # path-parameters-defined skipped: {channelId} param missing in skeleton
        # contract; INT-01 will fix in wave-1 contract freeze (D-004).
        run: |
          npx --yes @redocly/cli lint --skip-rule=path-parameters-defined \
            contracts/openapi/pulse-api.yaml

  # ── 2. Server ─────────────────────────────────────────────────────────────────
  server:
    runs-on: ubuntu-latest
    needs: contracts
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.8
        env:
          CLICKHOUSE_SKIP_USER_SETUP: "1"
        ports:
          - 9000:9000
          - 8123:8123
        options: >-
          --health-cmd "wget -qO- http://localhost:8123/?query=SELECT+1 || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      # CGO_ENABLED=0 is required for vet + build (pure-Go modernc.org/sqlite).
      - name: Vet (CGO_ENABLED=0)
        run: cd server && CGO_ENABLED=0 go vet ./...

      - name: Build (CGO_ENABLED=0)
        run: cd server && CGO_ENABLED=0 go build ./...

      # Race detector requires CGO (gcc is present on ubuntu-latest).
      # Do NOT set CGO_ENABLED=0 here — -race is incompatible with pure-Go CGO=0.
      - name: Unit tests with race detector
        run: cd server && go test ./... -race -timeout 300s

      # ── Integration step ─────────────────────────────────────────────────────
      # Build the binary and smoke-test pulse migrate against the CH service container.
      - name: Build pulse binary
        # The Go module lives in server/ (no go.mod/go.work at repo root), so this
        # MUST build from server/ — `go build ./server/cmd/pulse` from the repo root
        # fails with "go: cannot find main module".
        run: cd server && CGO_ENABLED=0 go build -o /tmp/pulse ./cmd/pulse

      - name: Run migrations (pulse migrate — smoke-test against CH service)
        env:
          PULSE_CLICKHOUSE_DSN: "clickhouse://localhost:9000/pulse"
          PULSE_MIGRATIONS_DIR: "contracts/db/clickhouse"
        run: /tmp/pulse migrate

      # Integration tests self-manage a ClickHouse subprocess: they look for
      # /tmp/clickhouse and skip (not fail) if absent. Download v26.6.1 so they
      # run on every push/PR (replaces the old nightly/label-gated approach).
      # The tests do NOT use PULSE_CLICKHOUSE_DSN — they start CH on random ports.
      - name: Download ClickHouse binary for integration tests
        # GitHub release assets do NOT include a single static `clickhouse-linux-amd64`
        # binary (only *.tgz/.deb/.rpm), so the previously pinned releases URL 404s.
        # Use the official builds server, which serves the static binary directly.
        run: |
          curl -fsSL -o /tmp/clickhouse \
            https://builds.clickhouse.com/master/amd64/clickhouse
          chmod +x /tmp/clickhouse
          /tmp/clickhouse --version

      - name: Integration tests
        env:
          PULSE_CLICKHOUSE_DSN: "clickhouse://localhost:9000/pulse"
          PULSE_MIGRATIONS_DIR: "contracts/db/clickhouse"
        run: cd server && go test -tags integration ./... -timeout 300s

  # ── 3. Web ───────────────────────────────────────────────────────────────────
  web:
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: cd web && npm ci --legacy-peer-deps

      # Types-drift guard: regenerate schema.d.ts and fail if it differs from
      # the committed version (prevents stale generated types slipping in).
      - name: Generate API types and check for drift
        # NB: after `cd web` the diff path is relative to web/ — it must be
        # src/lib/... (not web/src/...), else git errors "ambiguous argument".
        run: |
          cd web
          npm run gen:api
          git diff --exit-code src/lib/api/schema.d.ts

      - name: Build web UI
        run: cd web && npm run build

      # Hard failure — eslint.config.js is present (no '|| echo GAP' soft-skip).
      - name: Lint (HARD)
        run: cd web && npm run lint

      - name: Test
        run: cd web && npm test

  # ── 4. SDK ───────────────────────────────────────────────────────────────────
  sdk:
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: cd sdk/beacon-js && npm ci

      - name: Build beacon SDK
        run: cd sdk/beacon-js && npm run build

      # Hard 15 KB gzip gate (PRD §7, ADR-0003).
      - name: Size gate (15 KB gzip — HARD)
        run: cd sdk/beacon-js && npm run size

      # Hard failure — eslint.config.js is present (no '|| echo GAP' soft-skip).
      - name: Lint (HARD)
        run: cd sdk/beacon-js && npm run lint

      - name: Test (HARD)
        run: cd sdk/beacon-js && npm test

  # ── 5. Docker build ──────────────────────────────────────────────────────────
  # Prove the all-in-one Dockerfile builds end-to-end (build context = repo root).
  docker-build:
    runs-on: ubuntu-latest
    needs: [server, web, sdk]
    steps:
      - uses: actions/checkout@v4

      - name: Build all-in-one image
        run: |
          docker build \
            -f deploy/docker/pulse.Dockerfile \
            -t ghcr.io/aytekxr/ams-pulse:ci \
            .

  # ── 6. Helm ──────────────────────────────────────────────────────────────────
  # Lint + golden-file template diff.
  # D-002: no cluster available — template diff is the validation mechanism.
  # QA-01 must validate on a real cluster before this AC is fully green.
  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.17.0"

      - name: helm lint (zero failures required)
        run: |
          helm lint deploy/helm/pulse/
          echo "helm lint: PASS"

      - name: helm template — default values
        run: |
          helm template pulse deploy/helm/pulse/ > /tmp/golden-default.yaml
          echo "helm template (default): rendered $(wc -l < /tmp/golden-default.yaml) lines"

      - name: helm template — postgres + s3 values
        run: |
          helm template pulse deploy/helm/pulse/ \
            -f deploy/helm/tests/values-postgres-s3.yaml \
            > /tmp/golden-postgres-s3.yaml
          echo "helm template (postgres+s3): rendered $(wc -l < /tmp/golden-postgres-s3.yaml) lines"

      - name: helm template — external ClickHouse values
        run: |
          helm template pulse deploy/helm/pulse/ \
            -f deploy/helm/tests/values-external-clickhouse.yaml \
            > /tmp/golden-external-clickhouse.yaml
          echo "helm template (external-clickhouse): rendered $(wc -l < /tmp/golden-external-clickhouse.yaml) lines"

      - name: Golden-file diff (catch template regressions)
        run: |
          FAIL=0
          diff deploy/helm/tests/golden-default.yaml /tmp/golden-default.yaml \
            || { echo "FAIL: golden-default.yaml drift"; FAIL=1; }
          diff deploy/helm/tests/golden-postgres-s3.yaml /tmp/golden-postgres-s3.yaml \
            || { echo "FAIL: golden-postgres-s3.yaml drift"; FAIL=1; }
          diff deploy/helm/tests/golden-external-clickhouse.yaml /tmp/golden-external-clickhouse.yaml \
            || { echo "FAIL: golden-external-clickhouse.yaml drift"; FAIL=1; }
          [ $FAIL -eq 0 ] && echo "Golden-file diff: PASS (no drift)" || exit 1

      - name: D-002 limitation note
        run: |
          echo "NOTE(D-002): helm install/upgrade not run — no cluster available in dev env."
          echo "  QA-01 must validate chart on a real cluster before Helm AC is fully green."

  # ── 7. Compose ───────────────────────────────────────────────────────────────
  # Config-level validation of both the base file and the CI override.
  # A sibling agent authors deploy/docker-compose.ci.yml.
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate base compose config
        run: |
          docker compose -f deploy/docker-compose.yml config --quiet
          echo "docker compose (base): PASS"

      - name: Validate CI override compose config
        # PULSE_SECRET_KEY is :?-required by the CI override (sourced from the CI env
        # at e2e bring-up, never committed / never from .env). Provide a throwaway
        # value so config-only validation passes on a clean runner.
        env:
          PULSE_SECRET_KEY: ci-config-validation-dummy
        run: |
          docker compose \
            -f deploy/docker-compose.yml \
            -f deploy/docker-compose.ci.yml \
            config --quiet
          echo "docker compose (CI override): PASS"
