# Pulse CI — validates contracts, builds all components, runs tests.
# Hardened: go 1.25, node 22, GHCR lowercase, no soft-fail lint, real integration tests.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── 1. Contracts ─────────────────────────────────────────────────────────────
  # Source of truth — validate first; everything else depends on this job.
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON schemas (ajv draft2020)
        run: |
          npx --yes ajv-cli compile --spec=draft2020 --strict=false \
            -s contracts/events/ams-server-event.schema.json \
            -s contracts/events/beacon-event.schema.json \
            -s contracts/events/alert-notification.schema.json
      - name: Lint OpenAPI spec (redocly)
        # path-parameters-defined skipped: {channelId} param missing in skeleton
        # contract; INT-01 will fix in wave-1 contract freeze (D-004).
        run: |
          npx --yes @redocly/cli lint --skip-rule=path-parameters-defined \
            contracts/openapi/pulse-api.yaml

  # ── 2. Server ─────────────────────────────────────────────────────────────────
  server:
    runs-on: ubuntu-latest
    needs: contracts
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.8
        env:
          CLICKHOUSE_SKIP_USER_SETUP: "1"
        ports:
          - 9000:9000
          - 8123:8123
        options: >-
          --health-cmd "wget -qO- http://localhost:8123/?query=SELECT+1 || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pulse
          POSTGRES_PASSWORD: pulse
          POSTGRES_DB: pulse_meta_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pulse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      # D-053: the tree is fully gofmt'd (go1.25 reflow); any gofmt -l output fails.
      - name: gofmt gate
        run: |
          cd server
          DIRTY=$(gofmt -l .)
          if [ -n "$DIRTY" ]; then
            echo "FAIL: files need gofmt (run gofmt -w with go1.25):"
            echo "$DIRTY"
            exit 1
          fi
          echo "OK: gofmt clean"

      # CGO_ENABLED=0 is required for vet + build (pure-Go modernc.org/sqlite).
      - name: Vet (CGO_ENABLED=0)
        run: cd server && CGO_ENABLED=0 go vet ./...

      - name: Build (CGO_ENABLED=0)
        run: cd server && CGO_ENABLED=0 go build ./...

      # Race detector requires CGO (gcc is present on ubuntu-latest).
      # Do NOT set CGO_ENABLED=0 here — -race is incompatible with pure-Go CGO=0.
      - name: Unit tests with race detector
        run: cd server && go test ./... -race -timeout 300s -coverprofile=/tmp/cover.out -covermode=atomic

      # D-045: coverage no-regression ratchet. Floor sits just below the current
      # total (73.3% as of D-061; ratcheted 55→58 in D-053, 58→62 in D-059,
      # 62→66 in D-060, 66→70 in D-061 per ROADMAP §4) so accidental
      # deletions/regressions fail CI. Raise FLOOR as coverage climbs (GA target
      # ≥68 — exceeded). Non-integration run (query & store/clickhouse full paths
      # are covered separately by integration).
      - name: Coverage floor gate
        run: |
          cd server
          TOTAL=$(go tool cover -func=/tmp/cover.out | awk '/^total:/ {gsub("%","",$NF); print $NF}')
          FLOOR=70.2
          awk -v t="$TOTAL" -v f="$FLOOR" 'BEGIN {
            if (t+0 < f+0) { printf "FAIL: total coverage %.1f%% < floor %.1f%%\n", t, f; exit 1 }
            printf "OK: total coverage %.1f%% >= floor %.1f%%\n", t, f
          }'

      # qa/mock-ams and qa/licensegen each have their own go.mod and are NOT
      # covered by `./...` in server/ — run them here so e2e infra changes are
      # gated by their own unit tests (mock-ams pagination coverage from WO-4).
      - name: qa modules unit tests
        run: |
          (cd qa/mock-ams && go test -race -count=1 -timeout 300s ./...)
          (cd qa/licensegen && go test -race -count=1 -timeout 300s ./...)

      # ── Integration step ─────────────────────────────────────────────────────
      # Build the binary and smoke-test pulse migrate against the CH service container.
      - name: Build pulse binary
        # The Go module lives in server/ (no go.mod/go.work at repo root), so this
        # MUST build from server/ — `go build ./server/cmd/pulse` from the repo root
        # fails with "go: cannot find main module".
        run: cd server && CGO_ENABLED=0 go build -o /tmp/pulse ./cmd/pulse

      - name: Run migrations (pulse migrate — smoke-test against CH service)
        env:
          PULSE_CLICKHOUSE_DSN: "clickhouse://localhost:9000/pulse"
          PULSE_MIGRATIONS_DIR: "contracts/db/clickhouse"
          # D-052 fail-closed guard: migrate refuses to boot without a >=16-byte
          # secret key (non-:memory: meta DSN). CI-only dummy value, no secrets here.
          PULSE_SECRET_KEY: "ci-migrate-smoke-dummy-key-0123456789abcdef"
        run: /tmp/pulse migrate

      # Integration tests self-manage a ClickHouse subprocess: they look for
      # /tmp/clickhouse via testutil.RequireClickHouseBin — absent + CI=true
      # fails LOUD (D-065 WO-D, D-028-class defence); absent locally still skips.
      # Download v26.6.1 so they run on every push/PR.
      # The tests do NOT use PULSE_CLICKHOUSE_DSN — they start CH on random ports.
      - name: Download ClickHouse binary for integration tests
        # PINNED to a specific release (D-040) for DETERMINISTIC CI. The old
        # builds.clickhouse.com/master URL served a rolling build that changed between runs
        # (master drifted 26.6.1 -> 26.7.1.281), a non-deterministic dependency. GitHub ships
        # the static binary inside clickhouse-common-static-*.tgz; extract it from there.
        run: |
          CH_VER=26.6.1.1193
          curl -fsSL -o /tmp/ch.tgz \
            "https://github.com/ClickHouse/ClickHouse/releases/download/v${CH_VER}-stable/clickhouse-common-static-${CH_VER}-amd64.tgz"
          tar -xf /tmp/ch.tgz -C /tmp
          cp "$(find /tmp -type f -name clickhouse -path '*/bin/*' | head -1)" /tmp/clickhouse
          chmod +x /tmp/clickhouse
          /tmp/clickhouse --version

      - name: Integration tests
        env:
          PULSE_CLICKHOUSE_DSN: "clickhouse://localhost:9000/pulse"
          PULSE_MIGRATIONS_DIR: "contracts/db/clickhouse"
          PULSE_META_TEST_PG_DSN: "postgres://pulse:pulse@localhost:5432/pulse_meta_test?sslmode=disable"
        run: cd server && go test -tags integration ./... -timeout 300s

  # ── 3. Web ───────────────────────────────────────────────────────────────────
  web:
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: cd web && npm ci --legacy-peer-deps

      # Types-drift guard: regenerate schema.d.ts and fail if it differs from
      # the committed version (prevents stale generated types slipping in).
      - name: Generate API types and check for drift
        # NB: after `cd web` the diff path is relative to web/ — it must be
        # src/lib/... (not web/src/...), else git errors "ambiguous argument".
        run: |
          cd web
          npm run gen:api
          git diff --exit-code src/lib/api/schema.d.ts

      - name: Build web UI
        run: cd web && npm run build

      # Hard failure — eslint.config.js is present (no '|| echo GAP' soft-skip).
      - name: Lint (HARD)
        run: cd web && npm run lint

      - name: Test
        run: cd web && npm test

  # ── 4. SDK ───────────────────────────────────────────────────────────────────
  sdk:
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: cd sdk/beacon-js && npm ci

      - name: Build beacon SDK
        run: cd sdk/beacon-js && npm run build

      # Hard 15 KB gzip gate (PRD §7, ADR-0003).
      - name: Size gate (15 KB gzip — HARD)
        run: cd sdk/beacon-js && npm run size

      # Hard failure — eslint.config.js is present (no '|| echo GAP' soft-skip).
      - name: Lint (HARD)
        run: cd sdk/beacon-js && npm run lint

      - name: Test (HARD)
        run: cd sdk/beacon-js && npm test

  # ── 5. Docker build ──────────────────────────────────────────────────────────
  # Prove the all-in-one Dockerfile builds end-to-end (build context = repo root).
  # Version stamping: build-args inject VERSION/COMMIT/BUILD_DATE via ldflags so
  # `pulse version` inside the container prints real values instead of dev/unknown.
  docker-build:
    runs-on: ubuntu-latest
    needs: [server, web, sdk]
    steps:
      - uses: actions/checkout@v4

      - name: Compute version build-args
        id: ver
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          {
            echo "version=ci-${SHORT_SHA}"
            echo "commit=${SHORT_SHA}"
            echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - name: Build all-in-one image (version-stamped)
        run: |
          docker build \
            -f deploy/docker/pulse.Dockerfile \
            --build-arg VERSION="${{ steps.ver.outputs.version }}" \
            --build-arg COMMIT="${{ steps.ver.outputs.commit }}" \
            --build-arg BUILD_DATE="${{ steps.ver.outputs.build_date }}" \
            -t ghcr.io/aytekxr/ams-pulse:ci \
            .

      - name: Assert stamped version (mutation-proof vs dev/unknown)
        # Runs `pulse version` via the real binary (not `pulse serve version`).
        # If ldflags were removed the binary would report "pulse dev (commit unknown...)"
        # and this step would fail — that is the mutation guard.
        run: |
          OUT="$(docker run --rm --entrypoint pulse ghcr.io/aytekxr/ams-pulse:ci version)"
          echo "pulse version output: $OUT"
          if [ -z "$OUT" ]; then
            echo "FAIL: pulse version produced no output — nothing was validated"
            exit 1
          fi
          if echo "$OUT" | grep -qE '\bdev\b|unknown'; then
            echo "FAIL: version output contains 'dev' or 'unknown' — ldflags not applied"
            exit 1
          fi
          echo "OK: version is stamped correctly"

  # ── 6. Helm ──────────────────────────────────────────────────────────────────
  # Lint + golden-file template diff.
  # D-002: no cluster available — template diff is the validation mechanism.
  # QA-01 must validate on a real cluster before this AC is fully green.
  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.17.0"

      - name: helm lint (zero failures required)
        run: |
          helm lint deploy/helm/pulse/
          echo "helm lint: PASS"

      - name: helm template — default values
        run: |
          helm template pulse deploy/helm/pulse/ > /tmp/golden-default.yaml
          echo "helm template (default): rendered $(wc -l < /tmp/golden-default.yaml) lines"

      - name: helm template — postgres + s3 values
        run: |
          helm template pulse deploy/helm/pulse/ \
            -f deploy/helm/tests/values-postgres-s3.yaml \
            > /tmp/golden-postgres-s3.yaml
          echo "helm template (postgres+s3): rendered $(wc -l < /tmp/golden-postgres-s3.yaml) lines"

      - name: helm template — external ClickHouse values
        run: |
          helm template pulse deploy/helm/pulse/ \
            -f deploy/helm/tests/values-external-clickhouse.yaml \
            > /tmp/golden-external-clickhouse.yaml
          echo "helm template (external-clickhouse): rendered $(wc -l < /tmp/golden-external-clickhouse.yaml) lines"

      - name: Golden-file diff (catch template regressions)
        run: |
          FAIL=0
          diff deploy/helm/tests/golden-default.yaml /tmp/golden-default.yaml \
            || { echo "FAIL: golden-default.yaml drift"; FAIL=1; }
          diff deploy/helm/tests/golden-postgres-s3.yaml /tmp/golden-postgres-s3.yaml \
            || { echo "FAIL: golden-postgres-s3.yaml drift"; FAIL=1; }
          diff deploy/helm/tests/golden-external-clickhouse.yaml /tmp/golden-external-clickhouse.yaml \
            || { echo "FAIL: golden-external-clickhouse.yaml drift"; FAIL=1; }
          [ $FAIL -eq 0 ] && echo "Golden-file diff: PASS (no drift)" || exit 1

      - name: D-002 limitation note
        run: |
          echo "NOTE(D-002): helm install/upgrade not run — no cluster available in dev env."
          echo "  QA-01 must validate chart on a real cluster before Helm AC is fully green."

  # ── 8. Web e2e (Playwright) ──────────────────────────────────────────────────
  # Chromium-only, API route-mocked via page.route — no backend needed.
  # continue-on-error: true while stabilising; promote to required after 2 weeks green.
  # D-042 reminder: a wait that never resolves is a deterministic bug — never bump timeouts.
  web-e2e:
    runs-on: ubuntu-latest
    needs: contracts
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: cd web && npm ci --legacy-peer-deps

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('web/package-lock.json') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install Playwright browsers (chromium + system deps)
        run: cd web && npx playwright install chromium --with-deps

      - name: Build web UI
        run: cd web && npm run build

      - name: Run Playwright e2e tests
        run: cd web && npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            web/playwright-report/
            web/test-results/
          retention-days: 14

  # ── 7. Compose ───────────────────────────────────────────────────────────────
  # Config-level validation of both the base file and the CI override.
  # A sibling agent authors deploy/docker-compose.ci.yml.
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate base compose config
        run: |
          docker compose -f deploy/docker-compose.yml config --quiet
          echo "docker compose (base): PASS"

      - name: Validate CI override compose config
        # PULSE_SECRET_KEY is :?-required by the CI override (sourced from the CI env
        # at e2e bring-up, never committed / never from .env). Provide a throwaway
        # value so config-only validation passes on a clean runner.
        env:
          PULSE_SECRET_KEY: ci-config-validation-dummy
        run: |
          docker compose \
            -f deploy/docker-compose.yml \
            -f deploy/docker-compose.ci.yml \
            config --quiet
          echo "docker compose (CI override): PASS"

  slack-notify:
    name: Slack notification
    runs-on: ubuntu-latest
    needs: [contracts, server, web, sdk, docker-build, helm, web-e2e, compose]
    if: always()
    steps:
      - name: Notify Slack on success
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title || '' }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          MSG=$(printf '%s' "$COMMIT_MESSAGE" | head -n1)
          MSG=${MSG:-"(no commit message)"}
          TEXT=$(printf '✅ Build succeeded\n\nRepo: %s\nWorkflow: %s\nTime: %s\nCommit: %s - %s' \
            "${GITHUB_REPOSITORY##*/}" "$GITHUB_WORKFLOW" "$(date -u '+%Y-%m-%d %H:%M UTC')" \
            "${GITHUB_SHA:0:7}" "$MSG")
          jq -n --arg text "$TEXT" '{text: $text}' \
            | curl -sf -X POST -H 'Content-type: application/json' --data @- \
              "$SLACK_WEBHOOK_URL" \
            || echo "::warning::Slack success notification failed"

      - name: Notify Slack on failure
        if: ${{ contains(needs.*.result, 'failure') }}
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title || '' }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          MSG=$(printf '%s' "$COMMIT_MESSAGE" | head -n1)
          MSG=${MSG:-"(no commit message)"}
          FAILED_JOBS=$(printf '%s' "$NEEDS_JSON" | jq -r '[to_entries[] | select(.value.result == "failure") | .key] | join(", ")')
          TEXT=$(printf '❌ Build failed\n\nRepo: %s\nWorkflow: %s\nJob: %s\nBranch: %s\nActor: %s\nCommit: %s - %s\nRun: %s\nTime: %s' \
            "${GITHUB_REPOSITORY##*/}" "$GITHUB_WORKFLOW" "$FAILED_JOBS" "$GITHUB_REF_NAME" "$GITHUB_ACTOR" \
            "${GITHUB_SHA:0:7}" "$MSG" \
            "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            "$(date -u '+%Y-%m-%d %H:%M UTC')")
          jq -n --arg text "$TEXT" '{text: $text}' \
            | curl -sf -X POST -H 'Content-type: application/json' --data @- \
              "$SLACK_WEBHOOK_URL" \
            || echo "::warning::Slack failure notification failed"
