# Pulse e2e — brings up the full compose stack and asserts end-to-end behaviour:
#   • /healthz returns 200
#   • pulse-migrate exits 0
#   • ClickHouse schema tables exist
#   • live/overview shows streams/viewers > 0 after mock traffic
#   • A1: alert rule ingest_bitrate_floor lt 99999 fires → entry in /alerts/history?state=firing
#         Cannot-false-green: threshold 99999 vs fixed 2 kbps (wire 2000/1000, normalize.go:79)
#         — only passes when restpoller→snapshot→evaluator→meta-store→API all work.
#   • A3: mock-ams set_bitrate 2000000→400000 on e2e-stream-degrade → health_score 100→50
#         Cannot-false-green: asserting ==50 (not <100) on a named stream; a vanished stream
#         scores 0 (offline) and fails the equality check (query.go:164-173 enum mapping).
#   • A2: ephemeral Pro license + beacon startup_complete → startup_p50_ms > 0 in /qoe/summary
#         Cannot-false-green: Free tier 403s beacon ingest (beacon.go:307); the full chain —
#         license, ingest token, CH write, rollup_qoe_1h MV, gated read — must all work.
#
# D-042 rule: a timeout that never resolves with more waiting is a deterministic bug —
#   read the code, do NOT bump the timeout.

name: e2e

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate ephemeral secret key
        run: echo "PULSE_SECRET_KEY=$(openssl rand -hex 32)" >> "$GITHUB_ENV"

      # ── Mint ephemeral Business license ─────────────────────────────────────────
      - name: Mint ephemeral Business license
        run: |
          # license.go:168: PULSE_LICENSE_PUBKEY overrides the embedded dev key at runtime.
          # qa/licensegen/main.go: stdout = two GITHUB_ENV lines (PULSE_LICENSE_KEY +
          # PULSE_LICENSE_PUBKEY); stderr = go build output + claims JSON diagnostics → log.
          # golang:1.25 for Go-version determinism; no sg prefix needed on GitHub runners.
          # The two vars are passed into the pulse container via deploy/docker-compose.ci.yml.
          # Business tier required: webhook channels gate on Business+ (license.go:118).
          # A2 beacon step still works — CheckBeaconIngest gates on non-free only.
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/repo" \
            -w /repo/qa/licensegen \
            -e GOFLAGS=-buildvcs=false \
            golang:1.25 \
            go run . -tier business \
            >> "$GITHUB_ENV"
          echo "PULSE_LICENSE_KEY and PULSE_LICENSE_PUBKEY written to GITHUB_ENV."

      - name: Build and start stack
        run: |
          docker compose \
            -p pulse-e2e \
            -f deploy/docker-compose.yml \
            -f deploy/docker-compose.ci.yml \
            up -d --build

      - name: Wait for pulse /healthz (up to 150 s)
        run: |
          echo "Polling http://127.0.0.1:18090/healthz ..."
          deadline=$(( $(date +%s) + 150 ))
          while true; do
            if curl -m 5 -sf http://127.0.0.1:18090/healthz; then
              echo ""
              echo "pulse is healthy"
              break
            fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "TIMEOUT: pulse never became healthy after 150 s"
              exit 1
            fi
            echo "  not ready yet, retrying in 5 s ..."
            sleep 5
          done

      # ── Assert (a): /healthz 200 ────────────────────────────────────────────
      - name: Assert /healthz returns 200
        run: |
          STATUS=$(curl -m 5 -s -o /dev/null -w "%{http_code}" http://127.0.0.1:18090/healthz)
          echo "/healthz HTTP status: $STATUS"
          [ "$STATUS" = "200" ] || { echo "FAIL: expected 200, got $STATUS"; exit 1; }

      # ── Assert (b): pulse-migrate exited 0 ─────────────────────────────────
      - name: Assert pulse-migrate exited 0
        run: |
          CONTAINER=$(docker compose -p pulse-e2e ps -a --format json \
            | python3 -c "
          import sys, json
          rows = [json.loads(l) for l in sys.stdin if l.strip()]
          match = [r for r in rows if 'migrate' in r.get('Name','').lower() or 'migrate' in r.get('Service','').lower()]
          if not match:
              print('NOT_FOUND')
          else:
              print(match[0]['Name'])
          ")
          echo "pulse-migrate container: $CONTAINER"
          if [ "$CONTAINER" = "NOT_FOUND" ]; then
            echo "FAIL: pulse-migrate container not found in compose ps output"
            exit 1
          fi
          EXIT_CODE=$(docker inspect --format='{{.State.ExitCode}}' "$CONTAINER")
          echo "pulse-migrate exit code: $EXIT_CODE"
          [ "$EXIT_CODE" = "0" ] || { echo "FAIL: pulse-migrate exited $EXIT_CODE"; exit 1; }

      # ── Assert (c): ClickHouse schema tables are non-empty ─────────────────
      - name: Assert ClickHouse pulse tables exist
        run: |
          TABLES=$(docker compose \
            -p pulse-e2e \
            exec -T clickhouse \
            clickhouse-client --query "SHOW TABLES FROM pulse")
          echo "Tables in 'pulse' database:"
          echo "$TABLES"
          [ -n "$TABLES" ] || { echo "FAIL: no tables found in ClickHouse 'pulse' database"; exit 1; }

      # ── Extract bootstrap admin token ───────────────────────────────────────
      - name: Extract admin token from pulse logs
        run: |
          # The pulse binary prints the bootstrap token to stderr on first run:
          #   pulse: FIRST RUN — generated admin token: plt_<random>
          TOKEN=$(docker compose -p pulse-e2e logs pulse 2>&1 \
            | grep -o 'plt_[A-Za-z0-9_-]*' | head -1)
          if [ -z "$TOKEN" ]; then
            echo "FAIL: could not find bootstrap token in pulse logs"
            docker compose -p pulse-e2e logs pulse 2>&1 | tail -40
            exit 1
          fi
          echo "PULSE_ADMIN_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "Admin token found (prefix): ${TOKEN:0:10}..."

      # ── Wait for mock-ams to finish compiling and become ready ──────────────
      - name: Wait for mock-ams /healthz (up to 120 s)
        run: |
          echo "Polling http://127.0.0.1:19090/healthz ..."
          deadline=$(( $(date +%s) + 120 ))
          while true; do
            if curl -m 5 -sf http://127.0.0.1:19090/healthz; then
              echo ""
              echo "mock-ams is healthy"
              break
            fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "TIMEOUT: mock-ams never became healthy after 120 s"
              docker compose -p pulse-e2e logs mock-ams 2>&1 | tail -30
              exit 1
            fi
            echo "  not ready yet, retrying in 5 s ..."
            sleep 5
          done

      # ── Seed a stream via mock-ams control API ───────────────────────────────
      - name: Seed a broadcasting stream in mock-ams
        run: |
          # mock-ams is exposed on 127.0.0.1:19090 in CI (loopback only).
          curl -m 5 -sf \
            -X POST \
            -H 'Content-Type: application/json' \
            -d '{"stream_id":"e2e-stream-1","viewers":10}' \
            http://127.0.0.1:19090/control/publish
          echo "Stream seeded."

      # ── Wait for poll cycle to propagate seeded stream ───────────────────────
      - name: Wait 15 s for mock-ams traffic to propagate
        run: sleep 15

      # ── WO-B: WebRTC probe → mock-ams signaling → success=true ────────────────
      - name: WO-B — create WebRTC probe pointing at mock-ams signaling
        run: |
          HTTP_STATUS=$(curl -m 10 -s \
            -X POST \
            -H "Authorization: Bearer ${PULSE_ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"e2e-webrtc-probe","url":"ws://mock-ams:9090/live/websocket?streamId=e2e-stream-1","protocol":"webrtc","interval_s":30,"timeout_s":10}' \
            -o /tmp/webrtc_probe.json \
            -w "%{http_code}" \
            http://127.0.0.1:18090/api/v1/probes)
          BODY=$(cat /tmp/webrtc_probe.json)
          echo "Create WebRTC probe ($HTTP_STATUS): $BODY"
          [ "$HTTP_STATUS" = "201" ] || { echo "FAIL: expected 201, got $HTTP_STATUS"; exit 1; }
          PROBE_ID=$(echo "$BODY" | python3 -c "import sys, json; print(json.load(sys.stdin)['id'])")
          [ -n "$PROBE_ID" ] || { echo "FAIL: empty probe id"; exit 1; }
          echo "WEBRTC_PROBE_ID=$PROBE_ID" >> "$GITHUB_ENV"
          echo "WebRTC probe created: $PROBE_ID"

      - name: WO-B — poll for WebRTC probe success=true (120 s, 5 s interval)
        run: |
          # D-075 budget arithmetic: outer poll 120s >> probe timeout_s=10 >> 2s RTP hold + ~0.2s margin.
          # Strictly dominates at each level: 120 >> 10 >> ~2.2 (D-074 budget-inversion rule).
          echo "Polling /api/v1/probes/${WEBRTC_PROBE_ID}/results for WebRTC success (120 s, 5 s) ..."
          deadline=$(( $(date +%s) + 120 ))
          LAST_RESULTS=""
          while true; do
            LAST_RESULTS=$(curl -m 10 -s \
              -H "Authorization: Bearer ${PULSE_ADMIN_TOKEN}" \
              "http://127.0.0.1:18090/api/v1/probes/${WEBRTC_PROBE_ID}/results?limit=10")
            FOUND=$(echo "$LAST_RESULTS" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              items = d.get('items', [])
              for it in items:
                  if (it.get('success') == True
                      and it.get('connect_time_ms') is not None
                      and it.get('connect_time_ms', 0) > 0
                      and it.get('signaling_state') == 'offer_received'
                      and it.get('ice_state', '') == 'connected'
                      and it.get('error_code', '') == ''
                      and it.get('rtt_ms') is not None
                      and it.get('jitter_ms') is not None
                      and it.get('loss_pct') is not None):
                      print('yes')
                      sys.exit(0)
              print('no')
          except Exception:
              print('no')
          ")
            echo "  webrtc probe check: $FOUND"
            [ "$FOUND" = "yes" ] && break
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "TIMEOUT: no WebRTC probe result with success=true after 120 s"
              echo "Last probe results: $LAST_RESULTS"
              exit 1
            fi
            sleep 5
          done
          echo "PASS: WO-B — WebRTC probe success=true, connect_time_ms>0, signaling_state=offer_received, ice_state=connected, rtt_ms/jitter_ms/loss_pct present"

      # ── S13/WO-B': RTMP probe → mock-ams RTMP signaling → success=true ──────────
      - name: S13 WO-B' — create RTMP probe pointing at mock-ams
        run: |
          HTTP_STATUS=$(curl -m 10 -s \
            -X POST \
            -H "Authorization: Bearer ${PULSE_ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"e2e-rtmp-probe","url":"rtmp://mock-ams:11935/live/e2e-rtmp-probe","protocol":"rtmp","interval_s":30,"timeout_s":10}' \
            -o /tmp/rtmp_probe.json \
            -w "%{http_code}" \
            http://127.0.0.1:18090/api/v1/probes)
          BODY=$(cat /tmp/rtmp_probe.json)
          echo "Create RTMP probe ($HTTP_STATUS): $BODY"
          [ "$HTTP_STATUS" = "201" ] || { echo "FAIL: expected 201, got $HTTP_STATUS"; exit 1; }
          PROBE_ID=$(echo "$BODY" | python3 -c "import sys, json; print(json.load(sys.stdin)['id'])")
          [ -n "$PROBE_ID" ] || { echo "FAIL: empty probe id"; exit 1; }
          echo "RTMP_PROBE_ID=$PROBE_ID" >> "$GITHUB_ENV"
          echo "RTMP probe created: $PROBE_ID"

      - name: S13 WO-B' — poll for RTMP probe success=true (90 s, 5 s interval)
        run: |
          echo "Polling /api/v1/probes/${RTMP_PROBE_ID}/results for RTMP success (90 s, 5 s) ..."
          deadline=$(( $(date +%s) + 90 ))
          LAST_RESULTS=""
          while true; do
            LAST_RESULTS=$(curl -m 10 -s \
              -H "Authorization: Bearer ${PULSE_ADMIN_TOKEN}" \
              "http://127.0.0.1:18090/api/v1/probes/${RTMP_PROBE_ID}/results?limit=10")
            FOUND=$(echo "$LAST_RESULTS" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              items = d.get('items', [])
              for it in items:
                  if (it.get('success') == True
                      and it.get('connect_time_ms') is not None
                      and it.get('connect_time_ms', 0) > 0
                      and it.get('signaling_state', '') == 'app_accepted'
                      and it.get('error_code', '') == ''):
                      print('yes')
                      sys.exit(0)
              print('no')
          except Exception:
              print('no')
          ")
            echo "  rtmp probe check: $FOUND"
            [ "$FOUND" = "yes" ] && break
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "TIMEOUT: no RTMP probe result with success=true after 90 s"
              echo "Last probe results: $LAST_RESULTS"
              exit 1
            fi
            sleep 5
          done
          echo "PASS: S13/WO-B' — RTMP probe success=true, connect_time_ms>0, signaling_state=app_accepted (S30: URL has an app path, the S29 AMF0 connect leg must engage; handshake_complete here would mean it silently did not)"

      # ── S13/WO-C': DASH probe → mock-ams MPD → success=true ─────────────────────
      - name: S13 WO-C' — create DASH probe pointing at mock-ams
        run: |
          HTTP_STATUS=$(curl -m 10 -s \
            -X POST \
            -H "Authorization: Bearer ${PULSE_ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"e2e-dash-probe","url":"http://mock-ams:9090/live/streams/e2e-dash-probe.mpd","protocol":"dash","interval_s":30,"timeout_s":10}' \
            -o /tmp/dash_probe.json \
            -w "%{http_code}" \
            http://127.0.0.1:18090/api/v1/probes)
          BODY=$(cat /tmp/dash_probe.json)
          echo "Create DASH probe ($HTTP_STATUS): $BODY"
          [ "$HTTP_STATUS" = "201" ] || { echo "FAIL: expected 201, got $HTTP_STATUS"; exit 1; }
          PROBE_ID=$(echo "$BODY" | python3 -c "import sys, json; print(json.load(sys.stdin)['id'])")
          [ -n "$PROBE_ID" ] || { echo "FAIL: empty probe id"; exit 1; }
          echo "DASH_PROBE_ID=$PROBE_ID" >> "$GITHUB_ENV"
          echo "DASH probe created: $PROBE_ID"

      - name: S13 WO-C' — poll for DASH probe success=true (90 s, 5 s interval)
        run: |
          echo "Polling /api/v1/probes/${DASH_PROBE_ID}/results for DASH success (90 s, 5 s) ..."
          deadline=$(( $(date +%s) + 90 ))
          LAST_RESULTS=""
          while true; do
            LAST_RESULTS=$(curl -m 10 -s \
              -H "Authorization: Bearer ${PULSE_ADMIN_TOKEN}" \
              "http://127.0.0.1:18090/api/v1/probes/${DASH_PROBE_ID}/results?limit=10")
            FOUND=$(echo "$LAST_RESULTS" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              items = d.get('items', [])
              for it in items:
                  if (it.get('success') == True
                      and it.get('ttfb_ms') is not None
                      and it.get('ttfb_ms', 0) > 0
                      and it.get('bitrate_kbps') is not None
                      and it.get('bitrate_kbps', 0) > 0
                      and it.get('segment_ttfb_ms') is not None
                      and it.get('segment_ttfb_ms', 0) > 0
                      and it.get('error_code', '') == ''):
                      print('yes')
                      sys.exit(0)
              print('no')
          except Exception:
              print('no')
          ")
            echo "  dash probe check: $FOUND"
            [ "$FOUND" = "yes" ] && break
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "TIMEOUT: no DASH probe result with success=true after 90 s"
              echo "Last probe results: $LAST_RESULTS"
              exit 1
            fi
            sleep 5
          done
          echo "PASS: S13/WO-C' — DASH probe success=true, ttfb_ms>0, bitrate_kbps>0, segment_ttfb_ms>0"

      - name: Assert live/overview shows streams/viewers > 0
        run: |
          RESP=$(curl -m 5 -s \
            -H "Authorization: Bearer ${PULSE_ADMIN_TOKEN}" \
            http://127.0.0.1:18090/api/v1/live/overview)
          echo "live/overview response: $RESP"
          # API returns total_publishers (streams) and total_viewers at top level.
          echo "$RESP" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
          except Exception as e:
              print(f'FAIL: invalid JSON — {e}')
              sys.exit(1)
          streams  = data.get('total_publishers', 0)
          viewers  = data.get('total_viewers', 0)
          print(f'streams={streams}  viewers={viewers}')
          if int(streams) > 0 or int(viewers) > 0:
              print('PASS: live overview has activity')
          else:
              print('FAIL: both streams and viewers are 0')
              sys.exit(1)
          "

      # ── A1: Alert fires → /alerts/history ──────────────────────────────────────
      - name: A1 — create alert rule and assert firing history
        run: |
          # handleCreateAlertRule: server.go:1129; payload shape alertRuleFromAPI server.go:1932
          # (fields: name, metric, operator, threshold, window_s, cooldown_s)
          # Evaluator tick ≤5 s (evaluator.go:162); window_s:0 → near-instant; cooldown_s:1 minimum.
          # ingest_bitrate_floor value = s.IngestBitrate (wave2.go:65) = wire_bitrate/1000 kbps.
          # e2e-stream-1 wire bitrate 2000 bits/sec (mock-ams default) → 2 kbps < 99999 → fires.
          HTTP_STATUS=$(curl -m 5 -s \
            -X POST \
            -H "Authorization: Bearer ${PULSE_ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"e2e bitrate floor","metric":"ingest_bitrate_floor","operator":"lt","threshold":99999,"window_s":0,"cooldown_s":1}' \
            -o /tmp/rule_body.json \
            -w "%{http_code}" \
            http://127.0.0.1:18090/api/v1/alerts/rules)
          BODY=$(cat /tmp/rule_body.json)
          echo "Create rule response ($HTTP_STATUS): $BODY"
          [ "$HTTP_STATUS" = "201" ] || { echo "FAIL: expected 201, got $HTTP_STATUS"; exit 1; }

          echo "Polling /api/v1/alerts/history?state=firing for ingest_bitrate_floor (30 s, 2 s interval) ..."
          deadline=$(( $(date +%s) + 30 ))
          LAST_HIST=""
          while true; do
            LAST_HIST=$(curl -m 5 -s \
              -H "Authorization: Bearer ${PULSE_ADMIN_TOKEN}" \
              "http://127.0.0.1:18090/api/v1/alerts/history?state=firing")
            FOUND=$(echo "$LAST_HIST" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              items = d.get('items', [])
              if any(it.get('metric') == 'ingest_bitrate_floor' for it in items):
                  print('yes')
              else:
                  print('no')
          except Exception:
              print('no')
          ")
            echo "  history check: $FOUND"
            [ "$FOUND" = "yes" ] && break
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "TIMEOUT: no ingest_bitrate_floor alert in history after 30 s"
              echo "Last /alerts/history response: $LAST_HIST"
              exit 1
            fi
            sleep 2
          done
          echo "PASS: A1 — ingest_bitrate_floor alert found in firing history."

      # ── A3: Health-score transition ─────────────────────────────────────────────
      - name: A3 — assert health_score 100→50 on e2e-stream-degrade
        run: |
          # ComputeHealthScore: collector/ingest/health.go:297-348
          # ScoreToHealth:      collector/ingest/health.go:351 (≥0.80→Good→100, 0.50-0.79→Warning→50)
          # health_score enum:  query.go:164-173
          # normalize.go:79:    wire_bitrate / 1000 = kbps
          # wire 2000000 → 2000 kbps → score = 0.35*1.0 + 0.65*1.0 = 1.0 → Good → 100
          # wire 400000  → 400 kbps  → score = 0.35*0.2 + 0.65*1.0 = 0.72 → Warning → 50
          # Do NOT unpublish: 15 s sourceGoneTimeout would zero the score; <100 would false-pass.

          # Publish a dedicated stream (not e2e-stream-1 — no cross-assertion pollution).
          curl -m 5 -sf \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"stream_id":"e2e-stream-degrade","viewers":0}' \
            http://127.0.0.1:19090/control/publish
          echo "Published e2e-stream-degrade."

          # Set wire bitrate 2000000 bits/sec → Pulse sees 2000 kbps → health_score 100.
          curl -m 5 -sf \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"stream_id":"e2e-stream-degrade","bitrate":2000000}' \
            http://127.0.0.1:19090/control/set_bitrate
          echo "set_bitrate 2000000 bits/sec (→ 2000 kbps)."

          echo "Polling /api/v1/live/streams for e2e-stream-degrade health_score==100 (30 s, 2 s) ..."
          deadline=$(( $(date +%s) + 30 ))
          LAST_STREAMS=""
          while true; do
            LAST_STREAMS=$(curl -m 5 -s \
              -H "Authorization: Bearer ${PULSE_ADMIN_TOKEN}" \
              "http://127.0.0.1:18090/api/v1/live/streams")
            FOUND=$(echo "$LAST_STREAMS" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              for s in d.get('items', []):
                  if s.get('stream_id') == 'e2e-stream-degrade':
                      score = s.get('health_score', -1)
                      print('yes' if int(score) == 100 else 'no-score-' + str(score))
                      sys.exit(0)
              print('no-stream')
          except Exception:
              print('no')
          ")
            echo "  streams check (target==100): $FOUND"
            [ "$FOUND" = "yes" ] && break
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "TIMEOUT: e2e-stream-degrade never reached health_score==100 after 30 s"
              echo "Last /live/streams response: $LAST_STREAMS"
              exit 1
            fi
            sleep 2
          done
          echo "PASS: health_score==100 confirmed."

          # Degrade: wire 400000 bits/sec → 400 kbps → score 0.72 → Warning → health_score 50.
          curl -m 5 -sf \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"stream_id":"e2e-stream-degrade","bitrate":400000}' \
            http://127.0.0.1:19090/control/set_bitrate
          echo "set_bitrate 400000 bits/sec (→ 400 kbps)."

          echo "Polling /api/v1/live/streams for e2e-stream-degrade health_score==50 (30 s, 2 s) ..."
          deadline=$(( $(date +%s) + 30 ))
          LAST_STREAMS=""
          while true; do
            LAST_STREAMS=$(curl -m 5 -s \
              -H "Authorization: Bearer ${PULSE_ADMIN_TOKEN}" \
              "http://127.0.0.1:18090/api/v1/live/streams")
            FOUND=$(echo "$LAST_STREAMS" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              for s in d.get('items', []):
                  if s.get('stream_id') == 'e2e-stream-degrade':
                      score = s.get('health_score', -1)
                      print('yes' if int(score) == 50 else 'no-score-' + str(score))
                      sys.exit(0)
              print('no-stream')
          except Exception:
              print('no')
          ")
            echo "  streams check (target==50): $FOUND"
            [ "$FOUND" = "yes" ] && break
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "TIMEOUT: e2e-stream-degrade never reached health_score==50 after 30 s"
              echo "Last /live/streams response: $LAST_STREAMS"
              exit 1
            fi
            sleep 2
          done
          echo "PASS: A3 — health_score transition 100→50 confirmed on e2e-stream-degrade."

      # ── A2: Beacon → QoE summary ────────────────────────────────────────────────
      - name: A2 — mint ingest token, post beacon, poll QoE summary
        run: |
          # handleCreateToken:  server.go:1662; response carries "token" field (server.go:1696)
          # Token kind required to be "ingest" for X-Pulse-Ingest-Token auth path.
          # handleBeacon (port 8091): beacon.go:304; license gate beacon.go:306-310 (CheckBeaconIngest)
          # rollup_qoe_1h MV (0001_init.sql): filters event_type IN (startup_complete, heartbeat, …)
          # session_start events are NOT counted by the MV — must send startup_complete for signal.
          # QoE summary reads rollup_qoe_1h (query.go:742); startup_p50_ms populated on flush.
          # CH async batch flush interval: 2 s default (clickhouse.go:90); rollup fires on INSERT.
          # D-042: 120 s is the VERIFIED bound from D-039 — do NOT bump or shorten this poll.

          # Mint an ingest-kind token (kind and name are both required: server.go:1670).
          HTTP_STATUS=$(curl -m 5 -s \
            -X POST \
            -H "Authorization: Bearer ${PULSE_ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"kind":"ingest","name":"e2e-beacon"}' \
            -o /tmp/token_resp.json \
            -w "%{http_code}" \
            http://127.0.0.1:18090/api/v1/admin/tokens)
          TOKEN_BODY=$(cat /tmp/token_resp.json)
          echo "Token mint response ($HTTP_STATUS): $TOKEN_BODY"
          [ "$HTTP_STATUS" = "201" ] || { echo "FAIL: expected 201, got $HTTP_STATUS"; exit 1; }
          INGEST_TOKEN=$(echo "$TOKEN_BODY" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d['token'])")
          [ -n "$INGEST_TOKEN" ] || { echo "FAIL: empty token in response"; exit 1; }
          echo "Ingest token minted (prefix): ${INGEST_TOKEN:0:10}..."

          # Three events in one batch (MV filters startup_complete, heartbeat, rebuffer_end):
          #   startup_complete → populates startup_ms_state (startup_p50_ms assertion below)
          #   rebuffer_end     → rebuffer_ms=5000 → rebuffer_total_ms in rollup_qoe_1h
          #   heartbeat        → watch_ms=10000   → watch_time_ms in rollup_qoe_1h
          # rebuffer_ratio = 5000/10000 = 0.5 > threshold 0.0 → rebuffer alert fires (below).
          # app field set to "live" to match mock-ams app name so QoEForStream app filter hits.
          # session_id must be a UUID; ts is epoch ms generated at runtime, never hardcoded.
          BEACON_BODY=$(python3 -c "
          import uuid, json, time
          now_ms = int(time.time() * 1000)
          payload = {
              'version': 1,
              'session_id': str(uuid.uuid4()),
              'stream_id': 'e2e-stream-1',
              'app': 'live',
              'events': [
                  {'type': 'startup_complete', 'ts': now_ms,        'data': {'startup_ms': 100}},
                  {'type': 'rebuffer_end',     'ts': now_ms + 1000, 'data': {'duration_ms': 5000}},
                  {'type': 'heartbeat',        'ts': now_ms + 2000, 'data': {'watch_ms': 10000}}
              ]
          }
          print(json.dumps(payload))
          ")
          echo "Beacon payload: $BEACON_BODY"

          # POST to the dedicated beacon port (18091 = container :8091, beacon.go:304).
          HTTP_STATUS=$(curl -m 5 -s \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Pulse-Ingest-Token: ${INGEST_TOKEN}" \
            -d "$BEACON_BODY" \
            -o /tmp/beacon_resp.json \
            -w "%{http_code}" \
            http://127.0.0.1:18091/ingest/beacon)
          BEACON_RESP=$(cat /tmp/beacon_resp.json)
          echo "Beacon POST response ($HTTP_STATUS): $BEACON_RESP"
          [ "$HTTP_STATUS" = "202" ] || { echo "FAIL: expected 202, got $HTTP_STATUS (Free-tier gives 403 — check license vars)"; exit 1; }
          echo "$BEACON_RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          acc = d.get('accepted', -1)
          print(f'accepted={acc}')
          if int(acc) != 3:
              print(f'FAIL: expected accepted==3 (startup_complete+rebuffer_end+heartbeat), got {acc}')
              sys.exit(1)
          print('PASS: beacon accepted==3')
          "

          # Poll for startup_p50_ms > 0 in /qoe/summary (rollup latency up to 120 s per D-039).
          echo "Polling /api/v1/qoe/summary for startup_p50_ms > 0 (120 s, 5 s interval) ..."
          deadline=$(( $(date +%s) + 120 ))
          LAST_QOE=""
          while true; do
            LAST_QOE=$(curl -m 5 -s \
              -H "Authorization: Bearer ${PULSE_ADMIN_TOKEN}" \
              "http://127.0.0.1:18090/api/v1/qoe/summary")
            FOUND=$(echo "$LAST_QOE" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              p50 = d.get('totals', {}).get('startup_p50_ms', 0)
              print('yes' if p50 > 0 else 'no')
          except Exception:
              print('no')
          ")
            echo "  qoe check (startup_p50_ms > 0): $FOUND"
            [ "$FOUND" = "yes" ] && break
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "TIMEOUT: qoe/summary startup_p50_ms never > 0 after 120 s (D-042: do not bump)"
              echo "Last /qoe/summary response: $LAST_QOE"
              exit 1
            fi
            sleep 5
          done
          echo "PASS: A2 — startup_p50_ms > 0 in QoE summary — beacon ingest and rollup confirmed."

          # D-062: Create rebuffer_ratio alert rule and poll for it firing via the honest QoE reader.
          # Budget: ~2 s CH batch flush + ~5 s evaluator tick + margin = 60 s budget at 5 s interval.
          # threshold 0.0 fires on any non-zero rebuffer_ratio; the seeded ratio is 5000/10000=0.5.
          # window_s:0 evaluates immediately; cooldown_s:1 minimum; severity:warning.
          HTTP_STATUS=$(curl -m 5 -s \
            -X POST \
            -H "Authorization: Bearer ${PULSE_ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"e2e rebuffer honest","metric":"rebuffer_ratio","operator":"gt","threshold":0.0,"window_s":0,"cooldown_s":1,"severity":"warning"}' \
            -o /tmp/rebuf_rule.json \
            -w "%{http_code}" \
            http://127.0.0.1:18090/api/v1/alerts/rules)
          REBUF_RULE_BODY=$(cat /tmp/rebuf_rule.json)
          echo "Create rebuffer_ratio rule ($HTTP_STATUS): $REBUF_RULE_BODY"
          [ "$HTTP_STATUS" = "201" ] || { echo "FAIL: expected 201 for rebuffer rule, got $HTTP_STATUS"; exit 1; }

          echo "Polling /api/v1/alerts/history?state=firing for rebuffer_ratio (60 s, 5 s interval) ..."
          deadline=$(( $(date +%s) + 60 ))
          LAST_REBUF_HIST=""
          while true; do
            LAST_REBUF_HIST=$(curl -m 5 -s \
              -H "Authorization: Bearer ${PULSE_ADMIN_TOKEN}" \
              "http://127.0.0.1:18090/api/v1/alerts/history?state=firing")
            FOUND=$(echo "$LAST_REBUF_HIST" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              items = d.get('items', [])
              if any(it.get('metric') == 'rebuffer_ratio' for it in items):
                  print('yes')
              else:
                  print('no')
          except Exception:
              print('no')
          ")
            echo "  rebuffer_ratio history check: $FOUND"
            [ "$FOUND" = "yes" ] && break
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "TIMEOUT: no rebuffer_ratio alert in firing history after 60 s"
              echo "Last /alerts/history response: $LAST_REBUF_HIST"
              exit 1
            fi
            sleep 5
          done
          echo "PASS: A2 D-062 — rebuffer_ratio alert fired via honest QoEReader (value 0.5 > threshold 0.0)."

      # ── A4: webhook delivery_failure for dead-URL channel ───────────────────────
      - name: A4 — webhook delivery_failure recorded for dead-URL channel
        run: |
          # Proof that the P1 registry-sync fix works end-to-end:
          # - Create a webhook channel pointing at port 9 (discard, instantly ECONNREFUSED).
          # - Create a rule that fires immediately (ingest_bitrate_floor lt 99999;
          #   e2e-stream-1 bitrate from mock-ams ≈2 kbps which is < 99999).
          # - Poll /alerts/history?state=delivery_failure until the row appears.
          #
          # Timing derivation (evaluator.go:162-171, 499-505, webhook.go:44):
          #   ≤5 s tick + 4 attempts×~1 ms (ECONNREFUSED, no timeout wait) +
          #   max backoff (600+1200+2400 ms) = ≤9.2 s worst case.
          #   30 s budget at 2 s interval = 14 poll iterations — comfortable headroom.
          #
          # Config key is "webhook_url" (server.go:1331 — was "url", FIXED).
          # Webhook channels require Business tier (license.go:118).
          HTTP_STATUS=$(curl -m 5 -s \
            -X POST \
            -H "Authorization: Bearer ${PULSE_ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"type":"webhook","name":"e2e-dead-webhook","config":{"webhook_url":"http://127.0.0.1:9/"}}' \
            -o /tmp/df_channel.json \
            -w "%{http_code}" \
            http://127.0.0.1:18090/api/v1/alerts/channels)
          CHANNEL_BODY=$(cat /tmp/df_channel.json)
          echo "Create channel ($HTTP_STATUS): $CHANNEL_BODY"
          [ "$HTTP_STATUS" = "201" ] || { echo "FAIL: expected 201, got $HTTP_STATUS"; exit 1; }
          CHANNEL_ID=$(echo "$CHANNEL_BODY" | python3 -c "import sys, json; print(json.load(sys.stdin)['id'])")
          [ -n "$CHANNEL_ID" ] || { echo "FAIL: empty channel id"; exit 1; }

          # Create rule: ingest_bitrate_floor lt 99999 fires immediately
          # (e2e-stream-1 still live from A1; mock-ams bitrate ≈2 kbps < 99999).
          # window_s:0 fires on the first evaluator tick (≤5 s); cooldown_s:1 minimum.
          HTTP_STATUS=$(curl -m 5 -s \
            -X POST \
            -H "Authorization: Bearer ${PULSE_ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"e2e delivery fail\",\"metric\":\"ingest_bitrate_floor\",\"operator\":\"lt\",\"threshold\":99999,\"window_s\":0,\"cooldown_s\":1,\"channel_ids\":[\"${CHANNEL_ID}\"]}" \
            -o /tmp/df_rule.json \
            -w "%{http_code}" \
            http://127.0.0.1:18090/api/v1/alerts/rules)
          RULE_BODY=$(cat /tmp/df_rule.json)
          echo "Create rule ($HTTP_STATUS): $RULE_BODY"
          [ "$HTTP_STATUS" = "201" ] || { echo "FAIL: expected 201, got $HTTP_STATUS"; exit 1; }
          DF_RULE_ID=$(echo "$RULE_BODY" | python3 -c "import sys, json; print(json.load(sys.stdin)['id'])")
          [ -n "$DF_RULE_ID" ] || { echo "FAIL: empty rule id"; exit 1; }

          # Poll for delivery_failure row (30 s budget, 2 s interval).
          # Assert on state only — error strings are sanitized (evaluator.go:558-562).
          echo "Polling /api/v1/alerts/history?state=delivery_failure&rule_id=${DF_RULE_ID} (30 s, 2 s) ..."
          deadline=$(( $(date +%s) + 30 ))
          LAST_HIST=""
          while true; do
            LAST_HIST=$(curl -m 5 -s \
              -H "Authorization: Bearer ${PULSE_ADMIN_TOKEN}" \
              "http://127.0.0.1:18090/api/v1/alerts/history?state=delivery_failure&rule_id=${DF_RULE_ID}")
            FOUND=$(echo "$LAST_HIST" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              items = d.get('items', [])
              print('yes' if any(it.get('state') == 'delivery_failure' for it in items) else 'no')
          except Exception:
              print('no')
          ")
            echo "  delivery_failure check: $FOUND"
            [ "$FOUND" = "yes" ] && break
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "TIMEOUT: no delivery_failure row after 30 s"
              echo "Last /alerts/history response: $LAST_HIST"
              exit 1
            fi
            sleep 2
          done
          echo "PASS: A4 — delivery_failure row confirmed for dead-URL webhook channel."

      # ── A5: Anomaly alert fires → /alerts/history ─────────────────────────────────
      # Cannot-false-green: baseline mean ≈ 10 viewers (seeded at step "Seed a broadcasting
      # stream in mock-ams"), spike to 10000. Effective stddev floor = StddevRelEpsilon×mean
      # = 0.05×10 = 0.5 (anomaly.go:82,88). z = (10000-10)/0.5 = 19980 >> sigma=0.5 → fires.
      # Only passes when: rule creation (201) + evaluator loads rule + anomaly baseline reader
      # returns row with SampleCount≥2 + z-score > 0.5 + fire() + history API returns firing row.
      # Timing: PULSE_ANOMALY_TICK_S=5 (deploy/docker-compose.ci.yml pulse.environment);
      # by this step the stream has been live for 5+ minutes → baseline is already established.
      # 15 s sleep is a safety buffer (3 extra Detector ticks). D-042: do not reduce.
      # Metric alias: alert rule metric "viewer_count" maps to Detector baseline key "viewers"
      # (server/internal/alert/wave3.go metricAliases). window_s=3600 must match Detector
      # hardcoded window (anomaly.go:229).
      - name: A5 — seed viewer anomaly baseline, spike viewers, assert history
        run: |
          echo "Waiting 15 s for anomaly baseline to warm up (3 Detector ticks @ 5 s) ..."
          sleep 15

          # Create anomaly rule: viewer_count, sigma=0.5 (very sensitive), min_samples=2.
          # window_s=3600 matches Detector hardcoded windowS=3600 (anomaly.go:229).
          # operator and threshold are required fields but ignored by the evaluator for anomaly rules.
          HTTP_STATUS=$(curl -m 5 -s \
            -X POST \
            -H "Authorization: Bearer ${PULSE_ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"e2e anomaly","metric":"viewer_count","rule_type":"anomaly","window_s":3600,"sigma":0.5,"min_samples":2,"severity":"warning","operator":"gt","threshold":0}' \
            -o /tmp/anomaly_rule.json \
            -w "%{http_code}" \
            http://127.0.0.1:18090/api/v1/alerts/rules)
          echo "Create anomaly rule ($HTTP_STATUS): $(cat /tmp/anomaly_rule.json)"
          [ "$HTTP_STATUS" = "201" ] || { echo "FAIL: expected 201"; exit 1; }

          # Spike viewers to 10000 via mock-ams control API.
          # e2e-stream-1 was seeded at viewers=10 earlier in the workflow.
          # /control/set_viewers updates viewer counts without re-publishing.
          # mock-ams port 19090 (deploy/docker-compose.ci.yml mock-ams.ports).
          curl -m 5 -sf \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"stream_id":"e2e-stream-1","viewers":10000}' \
            http://127.0.0.1:19090/control/set_viewers
          echo "Spiked e2e-stream-1 viewers to 10000."

          echo "Polling /api/v1/alerts/history?state=firing for viewer_count anomaly (30 s, 2 s interval) ..."
          deadline=$(( $(date +%s) + 30 ))
          LAST_ANOM_HIST=""
          while true; do
            LAST_ANOM_HIST=$(curl -m 5 -s \
              -H "Authorization: Bearer ${PULSE_ADMIN_TOKEN}" \
              "http://127.0.0.1:18090/api/v1/alerts/history?state=firing")
            FOUND=$(echo "$LAST_ANOM_HIST" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              items = d.get('items', [])
              if any(it.get('metric') == 'viewer_count' for it in items):
                  print('yes')
              else:
                  print('no')
          except Exception:
              print('no')
          ")
            echo "  anomaly history check: $FOUND"
            [ "$FOUND" = "yes" ] && break
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "TIMEOUT: no viewer_count anomaly alert in history after 30 s"
              echo "Last /alerts/history response: $LAST_ANOM_HIST"
              exit 1
            fi
            sleep 2
          done
          echo "PASS: A5 — viewer_count anomaly alert found in firing history."

      # ── A5b: Ingest bitrate anomaly alert fires → /alerts/history ──────────────────
      # Cannot-false-green: baseline mean ≈ 2 kbps (e2e-stream-1 default wire 2000 bits/sec → 2 kbps
      # via normalize.go ÷1000); spike to 9000000 bits/sec = 9000 kbps. Effective stddev floor =
      # StddevRelEpsilon×mean = 0.05×2 = 0.1 kbps (anomaly.go:82,88). z = (9000-2)/0.1 = 89980
      # >> sigma=0.5 → fires. Metric: ingest_bitrate_kbps (NO alias — Detector key == rule name
      # per D-074 WO-D ruling). Spike is UPWARD only (downward would re-trigger health/alert steps'
      # conditions for e2e-stream-1; the A1 floor rule stays firing at 2 kbps < 99999 regardless).
      # Wire bitrate restored unconditionally via shell trap so later steps see 2000 bits/sec.
      # Timing: PULSE_ANOMALY_TICK_S=5; baseline established from stream uptime (5+ min by A5b);
      # 15 s sleep (3 ticks) after rule creation ensures ≥min_samples=2 at the baseline bitrate
      # before the spike. window_s=3600 matches Detector hardcoded windowS (anomaly.go:229).
      # Placement: immediately after A5 — WO-4 uses vd04-stream-* and does not depend on
      # e2e-stream-1 bitrate state; A5 viewer spike (10000) is unrelated to bitrate.
      # D-042: do not reduce poll budgets.
      - name: A5b — seed ingest_bitrate_kbps anomaly baseline, spike bitrate, assert history
        run: |
          PRIOR_WIRE_BITRATE=2000
          restore_bitrate() {
            curl -m 5 -s \
              -X POST \
              -H "Content-Type: application/json" \
              -d "{\"stream_id\":\"e2e-stream-1\",\"bitrate\":${PRIOR_WIRE_BITRATE}}" \
              http://127.0.0.1:19090/control/set_bitrate
            echo "Restored e2e-stream-1 wire bitrate to ${PRIOR_WIRE_BITRATE} bits/sec (2 kbps)."
          }
          trap restore_bitrate EXIT

          # Create anomaly rule: ingest_bitrate_kbps, sigma=0.5, min_samples=2, window_s=3600.
          # operator and threshold are required fields but ignored by the evaluator for anomaly rules.
          HTTP_STATUS=$(curl -m 5 -s \
            -X POST \
            -H "Authorization: Bearer ${PULSE_ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"e2e bitrate anomaly","metric":"ingest_bitrate_kbps","rule_type":"anomaly","window_s":3600,"sigma":0.5,"min_samples":2,"severity":"warning","operator":"gt","threshold":0}' \
            -o /tmp/bitrate_anomaly_rule.json \
            -w "%{http_code}" \
            http://127.0.0.1:18090/api/v1/alerts/rules)
          echo "Create ingest_bitrate_kbps anomaly rule ($HTTP_STATUS): $(cat /tmp/bitrate_anomaly_rule.json)"
          [ "$HTTP_STATUS" = "201" ] || { echo "FAIL: expected 201"; exit 1; }

          # Wait 15 s for the Detector to accumulate ≥min_samples=2 baseline samples at the
          # current wire bitrate before the spike (3 Detector ticks @ PULSE_ANOMALY_TICK_S=5).
          echo "Waiting 15 s for ingest_bitrate_kbps baseline to accumulate (3 ticks @ 5 s) ..."
          sleep 15

          # Spike e2e-stream-1 wire bitrate UPWARD to 9000000 bits/sec → 9000 kbps in Pulse.
          # NEVER downward: a downward spike would change e2e-stream-1 health score and could
          # re-trigger alert/health conditions in later steps.
          curl -m 5 -sf \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"stream_id":"e2e-stream-1","bitrate":9000000}' \
            http://127.0.0.1:19090/control/set_bitrate
          echo "Spiked e2e-stream-1 wire bitrate to 9000000 bits/sec (→ 9000 kbps)."

          echo "Polling /api/v1/alerts/history?state=firing for ingest_bitrate_kbps anomaly (60 s, 5 s interval) ..."
          deadline=$(( $(date +%s) + 60 ))
          LAST_BITRATE_HIST=""
          while true; do
            LAST_BITRATE_HIST=$(curl -m 5 -s \
              -H "Authorization: Bearer ${PULSE_ADMIN_TOKEN}" \
              "http://127.0.0.1:18090/api/v1/alerts/history?state=firing")
            FOUND=$(echo "$LAST_BITRATE_HIST" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              items = d.get('items', [])
              if any(it.get('metric') == 'ingest_bitrate_kbps' for it in items):
                  print('yes')
              else:
                  print('no')
          except Exception:
              print('no')
          ")
            echo "  ingest_bitrate_kbps anomaly history check: $FOUND"
            [ "$FOUND" = "yes" ] && break
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "TIMEOUT: no ingest_bitrate_kbps anomaly alert in history after 60 s"
              echo "Last /alerts/history response: $LAST_BITRATE_HIST"
              exit 1
            fi
            sleep 5
          done
          echo "PASS: A5b — ingest_bitrate_kbps anomaly alert found in firing history."

      # ── WO-4: 500-stream render measurement (VD-04/A10) ────────────────────────────
      - name: WO-4 — seed 500 streams via mock-ams bulk_publish
        run: |
          curl -m 15 -sf \
            -X POST \
            -H 'Content-Type: application/json' \
            -d '{"count":500,"prefix":"vd04-stream-","viewers_each":0}' \
            http://127.0.0.1:19090/control/bulk_publish
          echo "500 streams seeded."

      - name: WO-4 — wait 15 s for restpoller propagation
        run: sleep 15

      - name: WO-4 — assert 500 vd04 streams flow through poller → API
        run: |
          # The stack has 502 live streams here: 500 vd04 + e2e-stream-1 (A1) +
          # e2e-stream-degrade (A3). /live/streams caps a page at 500 (query.go),
          # so a page can NEVER contain all 500 vd04 items alongside the 2 e2e
          # streams — the first run of this step demanded that and failed 498≠500.
          # Correct asserts:
          #   1. /live/overview total_publishers >= 502 — the FULL set survived
          #      poller pagination (the regression this step really guards: the
          #      pre-D-061 mock-ams page bug silently dropped streams).
          #   2. The streams page is full at the 500 cap.
          #   3. >=498 of the page rows are vd04 (2 slots legitimately held by
          #      the A1/A3 streams).
          OVERVIEW=$(curl -m 10 -s \
            -H "Authorization: Bearer ${PULSE_ADMIN_TOKEN}" \
            "http://127.0.0.1:18090/api/v1/live/overview")
          PUBS=$(echo "$OVERVIEW" | python3 -c "import sys,json; print(json.load(sys.stdin).get('total_publishers',0))")
          echo "overview total_publishers: $PUBS"
          [ "$PUBS" -ge 502 ] || { echo "FAIL: expected >=502 publishers (500 vd04 + 2 e2e), got $PUBS — poller dropped streams"; exit 1; }
          RESP=$(curl -m 10 -s \
            -H "Authorization: Bearer ${PULSE_ADMIN_TOKEN}" \
            "http://127.0.0.1:18090/api/v1/live/streams?limit=500")
          TOTAL=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('items',[])))")
          VD04=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(sum(1 for s in d.get('items',[]) if s.get('stream_id','').startswith('vd04-stream-')))")
          echo "streams page: total=$TOTAL vd04=$VD04"
          [ "$TOTAL" = "500" ] || { echo "FAIL: expected a full 500-item page at the cap, got $TOTAL"; exit 1; }
          [ "$VD04" -ge 498 ] || { echo "FAIL: expected >=498 vd04 items in the page, got $VD04"; exit 1; }
          echo "PASS: 502 publishers via overview; full 500-item page ($VD04 vd04)."

      - name: WO-4 — VD-04 Playwright render measurement
        env:
          PULSE_BASE_URL: http://127.0.0.1:18090
          PULSE_ADMIN_TOKEN: ${{ env.PULSE_ADMIN_TOKEN }}
        run: |
          cd web
          npm ci --legacy-peer-deps
          npx playwright install chromium --with-deps
          npx playwright test \
            --config playwright.realstack.config.ts \
            e2e/streams-render-500.spec.ts \
            --reporter=list 2>&1 | tee /tmp/pw-vd04.log
          grep -E 'render_ms=' /tmp/pw-vd04.log || true

      # ── Teardown — always runs ───────────────────────────────────────────────
      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose \
            -p pulse-e2e \
            -f deploy/docker-compose.yml \
            -f deploy/docker-compose.ci.yml \
            logs --no-color

      - name: Tear down stack and remove volumes
        if: always()
        run: |
          docker compose \
            -p pulse-e2e \
            -f deploy/docker-compose.yml \
            -f deploy/docker-compose.ci.yml \
            down -v

  csp-e2e:
    runs-on: ubuntu-latest
    # HARD GATE since D-162 (§2.7): promoted alongside web-e2e after its one flaky
    # spec (the dashboard 401-bounce race, csp.spec.ts test 3) was fixed at the
    # spec. Do not re-soften; fix flakes at the spec.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate ephemeral secret key
        run: echo "PULSE_SECRET_KEY=$(openssl rand -hex 32)" >> "$GITHUB_ENV"

      # License is not required — auth gate renders without it; dashboard is
      # mocked via page.route().  Add the license mint step if future specs
      # exercise real API endpoints (they will 403 LICENSE_REQUIRED without it).

      - name: Build and start CSP stack (pulse + caddy)
        run: |
          docker compose \
            -p pulse-csp-e2e \
            -f deploy/docker-compose.yml \
            -f deploy/docker-compose.ci.yml \
            -f deploy/docker-compose.csp-e2e.yml \
            up -d --build

      - name: Wait for pulse + caddy healthy via /healthz (up to 150 s)
        run: |
          echo "Polling http://127.0.0.1:18080/healthz through Caddy ..."
          deadline=$(( $(date +%s) + 150 ))
          while true; do
            if curl -m 5 -sf http://127.0.0.1:18080/healthz; then
              echo ""
              echo "Caddy + pulse are healthy"
              break
            fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "TIMEOUT: /healthz through Caddy never succeeded after 150 s"
              docker compose \
                -p pulse-csp-e2e \
                -f deploy/docker-compose.yml \
                -f deploy/docker-compose.ci.yml \
                -f deploy/docker-compose.csp-e2e.yml \
                logs --no-color
              exit 1
            fi
            sleep 5
          done

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install web dependencies
        run: cd web && npm ci --legacy-peer-deps

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-csp-${{ hashFiles('web/package-lock.json') }}
          restore-keys: ${{ runner.os }}-playwright-csp-

      - name: Install Playwright browsers (chromium + system deps)
        run: cd web && npx playwright install chromium --with-deps

      - name: Run CSP Playwright tests
        env:
          # Use localhost (not 127.0.0.1) so window.location.host == localhost:18080,
          # which matches the CSP connect-src 'ws://localhost:18080' directive.
          CADDY_BASE_URL: "http://localhost:18080"
        run: cd web && npx playwright test --config playwright.csp.config.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-csp-report
          path: |
            web/playwright-report/
            web/test-results/
          retention-days: 14

      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose \
            -p pulse-csp-e2e \
            -f deploy/docker-compose.yml \
            -f deploy/docker-compose.ci.yml \
            -f deploy/docker-compose.csp-e2e.yml \
            logs --no-color

      - name: Tear down stack and remove volumes
        if: always()
        run: |
          docker compose \
            -p pulse-csp-e2e \
            -f deploy/docker-compose.yml \
            -f deploy/docker-compose.ci.yml \
            -f deploy/docker-compose.csp-e2e.yml \
            down -v

  slack-notify:
    name: Slack notification
    runs-on: ubuntu-latest
    needs: [e2e, csp-e2e]
    if: always()
    steps:
      - name: Notify Slack on success
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title || '' }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          MSG=$(printf '%s' "$COMMIT_MESSAGE" | head -n1)
          MSG=${MSG:-"(no commit message)"}
          TEXT=$(printf '✅ Build succeeded\n\nRepo: %s\nWorkflow: %s\nTime: %s\nCommit: %s - %s' \
            "${GITHUB_REPOSITORY##*/}" "$GITHUB_WORKFLOW" "$(date -u '+%Y-%m-%d %H:%M UTC')" \
            "${GITHUB_SHA:0:7}" "$MSG")
          jq -n --arg text "$TEXT" '{text: $text}' \
            | curl -sf -X POST -H 'Content-type: application/json' --data @- \
              "$SLACK_WEBHOOK_URL" \
            || echo "::warning::Slack success notification failed"

      - name: Notify Slack on failure
        if: ${{ contains(needs.*.result, 'failure') }}
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title || '' }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          MSG=$(printf '%s' "$COMMIT_MESSAGE" | head -n1)
          MSG=${MSG:-"(no commit message)"}
          FAILED_JOBS=$(printf '%s' "$NEEDS_JSON" | jq -r '[to_entries[] | select(.value.result == "failure") | .key] | join(", ")')
          TEXT=$(printf '❌ Build failed\n\nRepo: %s\nWorkflow: %s\nJob: %s\nBranch: %s\nActor: %s\nCommit: %s - %s\nRun: %s\nTime: %s' \
            "${GITHUB_REPOSITORY##*/}" "$GITHUB_WORKFLOW" "$FAILED_JOBS" "$GITHUB_REF_NAME" "$GITHUB_ACTOR" \
            "${GITHUB_SHA:0:7}" "$MSG" \
            "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            "$(date -u '+%Y-%m-%d %H:%M UTC')")
          jq -n --arg text "$TEXT" '{text: $text}' \
            | curl -sf -X POST -H 'Content-type: application/json' --data @- \
              "$SLACK_WEBHOOK_URL" \
            || echo "::warning::Slack failure notification failed"
