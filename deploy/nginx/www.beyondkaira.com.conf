# =============================================================================
# nginx site — www -> apex 301. Replaces the `www.{$PULSE_DOMAIN}` block in
# deploy/config/Caddyfile.prod (`redir https://{$PULSE_DOMAIN}{uri} permanent`).
#
# Both :80 and :443 redirect, so a visitor who types https://www... still lands
# on the apex. The :443 server needs the cert because it terminates TLS before
# it can emit the redirect (the wildcard covers www.beyondkaira.com).
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name www.beyondkaira.com;
    return 301 https://beyondkaira.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.beyondkaira.com;

    ssl_certificate     /etc/letsencrypt/live/beyondkaira.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beyondkaira.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    server_tokens off;

    return 301 https://beyondkaira.com$request_uri;
}
