# =============================================================================
# nginx site — Ant Media Server panel. Replaces the `ams.{$PULSE_DOMAIN}` block
# in deploy/config/Caddyfile.prod.
#
# AMS runs as the `antmedia` container with `--network host`, serving plain HTTP
# on :5080. The old Caddy (a container) had to reach it via the VPS public IP
# (`{$AMS_UPSTREAM}`, default 161.97.172.146:5080). nginx runs ON THE HOST, so it
# reaches the SAME listener over loopback — 127.0.0.1:5080 — which keeps the
# panel traffic off the public interface between edge and app. (If AMS is ever
# moved off `--network host`, set this back to the reachable address.)
#
# TLS terminates here so the panel password is encrypted in transit. Minimal
# headers only: AMS ships its own UI + CSP and a strict policy breaks it — this
# mirrors the Caddy block, which set only HSTS + stripped Server.
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name ams.beyondkaira.com;
    location ^~ /.well-known/acme-challenge/ { root /var/www/certbot; default_type "text/plain"; try_files $uri =404; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ams.beyondkaira.com;

    ssl_certificate     /etc/letsencrypt/live/beyondkaira.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beyondkaira.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    server_tokens off;
    # Minimal headers, matching the Caddy ams block (HSTS only; -Server == tokens off).
    add_header Strict-Transport-Security "max-age=31536000" always;

    access_log /var/log/nginx/ams.access.log;
    error_log  /var/log/nginx/ams.error.log;

    # AMS is a large panel with big config POSTs and WebSocket (WebRTC signalling)
    # upgrades; give it room and pass the upgrade headers Caddy handled implicitly.
    client_max_body_size 64m;

    location / {
        proxy_pass http://127.0.0.1:5080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_connect_timeout 5s;
    }
}
