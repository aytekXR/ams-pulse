# =============================================================================
# nginx site — Pulse app.  Replaces the `{$PULSE_DOMAIN}, pulse.{$PULSE_DOMAIN}`
# block in deploy/config/Caddyfile.prod, host-for-host and route-for-route.
#
# WHY THIS FILE EXISTS
#   The old edge was the SHARED containerised Caddy (pulse-prod-caddy-1). Because
#   it ran in a container it reached the app by Docker network alias
#   (`reverse_proxy pulse:8090`) and had to bind :80/:443 to the world. The new
#   edge is nginx ON THE HOST. A host process cannot reach a Docker network
#   alias, so the Pulse stack must publish its three listeners on the loopback
#   interface — see deploy/docker-compose.nginx-edge.yml (ADDITIVE overlay). nginx
#   then proxies to 127.0.0.1:{8090,8091,8092}. Those ports are bound to
#   127.0.0.1 only, so they are NOT internet-reachable — the same privacy the
#   Caddy-in-a-container topology could not give a host bind.
#
#   This is EDGE-ONLY. Pulse remains a docker-compose stack (Go server +
#   ClickHouse + Kafka). Nothing here changes how Pulse is built or supervised.
#
# ROUTING — an exact transcription of the Caddyfile.prod pulse block:
#   handle_path /beacon/*  -> pulse:8091   (Caddy STRIPS /beacon)
#   handle      /webhook/* -> pulse:8092   (Caddy does NOT strip)
#   handle      (default)  -> pulse:8090   (UI + API, incl. /healthz, WS)
#
# Install: see deploy/MIGRATION.md. In short — copy to
#   /etc/nginx/sites-available/pulse.beyondkaira.com.conf, symlink into
#   sites-enabled/, `sudo nginx -t && sudo systemctl reload nginx`.
# =============================================================================

upstream pulse_app     { server 127.0.0.1:8090; keepalive 16; }  # UI + API
upstream pulse_beacon  { server 127.0.0.1:8091; }                # beacon ingest
upstream pulse_webhook { server 127.0.0.1:8092; }                # AMS webhooks

# Port 80: serve the ACME HTTP-01 challenge for renewal, redirect everything else
# to HTTPS. pulse.beyondkaira.com ONLY — the apex (beyondkaira.com) is now a
# separate static holding page (beyondkaira.com.conf). The redirect lives in
# `location /` so the more-specific challenge location wins.
server {
    listen 80;
    listen [::]:80;
    server_name pulse.beyondkaira.com;
    # HTTP-01 webroot carve-out (certbot --webroot -w /var/www/certbot) so the one
    # beyondkaira.com cert can renew unattended even though :80 redirects.
    location ^~ /.well-known/acme-challenge/ { root /var/www/certbot; default_type "text/plain"; try_files $uri =404; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    # Pulse is served ONLY here now. The apex (beyondkaira.com) was split out to a
    # static holding page — see beyondkaira.com.conf.
    server_name pulse.beyondkaira.com;

    # ONE SAN cert named beyondkaira.com (HTTP-01 via certbot --nginx, auto-
    # renewing) covers apex + every subdomain. See shared/docs/MIGRATION-REPORT.md.
    ssl_certificate     /etc/letsencrypt/live/beyondkaira.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beyondkaira.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    server_tokens off;

    # Security headers — mirror of the Caddy `header {}` block for this site.
    # `always` so they are emitted on error responses too (Caddy always did).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' wss://pulse.beyondkaira.com https://pulse.beyondkaira.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    # Beacon/API bodies: raise the 1 MB nginx default (Caddy had no cap) so large
    # batched beacon posts / API payloads are not 413'd at the edge before the app.
    client_max_body_size 16m;

    access_log /var/log/nginx/pulse.access.log;
    error_log  /var/log/nginx/pulse.error.log;

    # Beacon ingest. Caddy used `handle_path /beacon/*`, which STRIPS the /beacon
    # prefix before forwarding. The trailing slash on BOTH the location and the
    # proxy_pass target reproduces that strip: /beacon/ingest/beacon -> the
    # upstream sees /ingest/beacon (the only route the :8091 listener serves).
    location /beacon/ {
        proxy_pass http://pulse_beacon/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # AMS lifecycle webhooks. Caddy used plain `handle /webhook/*` (NO strip), so
    # the full /webhook/... path is preserved to the :8092 listener. No trailing
    # slash on proxy_pass => path passed through unchanged.
    location /webhook/ {
        proxy_pass http://pulse_webhook;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # UI + API + /healthz + everything else -> :8090. WebSocket-capable (the SPA
    # opens wss:// for live streams — see the CSP connect-src above).
    location / {
        proxy_pass http://pulse_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;   # long-lived WebSocket / SSE streams
        proxy_connect_timeout 5s;
    }
}
