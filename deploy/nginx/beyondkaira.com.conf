# =============================================================================
# nginx site — beyondkaira.com apex (static holding page).
#
# The Pulse app used to be served here too: the old shared Caddyfile served the
# apex and pulse.beyondkaira.com from ONE block, and the first nginx port kept
# that. Pulse now lives ONLY at pulse.beyondkaira.com; the apex serves a static
# holding page from /var/www/beyondkaira-apex (source: deploy/nginx/apex/, copied
# into place by ../../deploy-apps.sh). www.beyondkaira.com 301s here.
#
# Install (👤 owner, sudo):
#   sudo install -d /var/www/beyondkaira-apex
#   sudo cp deploy/nginx/apex/index.html /var/www/beyondkaira-apex/
#   sudo cp deploy/nginx/beyondkaira.com.conf /etc/nginx/sites-available/
#   sudo ln -sfn /etc/nginx/sites-available/beyondkaira.com.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# Port 80: ACME HTTP-01 challenge, then redirect to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name beyondkaira.com;
    location ^~ /.well-known/acme-challenge/ { root /var/www/certbot; default_type "text/plain"; try_files $uri =404; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name beyondkaira.com;

    # Same SAN cert as every other beyondkaira.com vhost (apex is a -d on it).
    ssl_certificate     /etc/letsencrypt/live/beyondkaira.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/beyondkaira.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    server_tokens off;

    # Static page → no app upstream, so a self-contained CSP (no connect-src to an
    # API, no external assets). Everything inline in index.html.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'" always;

    access_log /var/log/nginx/apex.access.log;
    error_log  /var/log/nginx/apex.error.log;

    root /var/www/beyondkaira-apex;
    index index.html;

    # A missing webroot must not 500 the apex — fall back to a plain 200 line.
    location / {
        try_files $uri $uri/ @empty;
    }
    location @empty {
        default_type text/plain;
        return 200 "beyondkaira.com\n";
    }
}
