# =============================================================================
# Shared http-context map — WebSocket Connection upgrade.
#
# Placed ONCE per host (not per site). It defines $connection_upgrade, used by
# both pulse.beyondkaira.com.conf and ams.beyondkaira.com.conf to proxy
# WebSocket upgrades the way the old Caddy did automatically.
#
# Install (owner, once):
#   sudo cp deploy/nginx/00-beyondkaira-maps.conf /etc/nginx/conf.d/00-beyondkaira-maps.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# conf.d/*.conf is included in nginx's http{} block by the stock nginx.conf, so
# the map lives at http scope and every server block can reference it. Define it
# in exactly one file to avoid a "duplicate map" parse error.
# =============================================================================
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
