# Pulse — real-AMS override.
#
# Layers on top of the consolidated prod compose file (docker-compose.hardened.yml
# was merged into docker-compose.prod.yml at the 2026-07-23 nginx cutover, PR #199):
#
#   docker compose -p pulse-prod \
#     -f deploy/docker-compose.prod.yml \
#     -f deploy/docker-compose.real-ams.yml \
#     --env-file deploy/.env \
#     up -d
#
# Production canonical form adds -f deploy/docker-compose.backup.yml (see
# deploy/runbooks/upgrade-rollback.md).
#
# This override:
#   1. Disables mock-ams (assigns an unused profile so it never starts).
#   2. Wires pulse to your production Ant Media Server via operator-supplied env vars.
#
# AMS Enterprise Edition uses cookie-session auth (email + password login).
# Set PULSE_AMS_LOGIN_EMAIL + PULSE_AMS_LOGIN_PASSWORD for automatic session management.
# PULSE_AMS_AUTH_TOKEN is optional (leave unset if your AMS uses cookie-session only).
#
# Required env vars (set in deploy/.env or your secrets manager):
#
#   PULSE_AMS_URL              AMS REST base URL, e.g. http://10.0.1.10:5080
#   PULSE_AMS_NODE_ID          AMS node identifier emitted in events (e.g. node-01)
#
# Optional env vars:
#
#   PULSE_AMS_LOGIN_EMAIL      AMS admin email for cookie-session auth
#   PULSE_AMS_LOGIN_PASSWORD   AMS admin password for cookie-session auth
#   PULSE_AMS_AUTH_TOKEN       AMS REST bearer token (optional; not needed for cookie-session)
#   PULSE_AMS_APPLICATIONS     Comma-separated app names to poll, e.g. live,vod
#                              Empty / omit = poll all applications
#
# Validation (requires placeholder env values if .env is absent):
#
#   PULSE_AMS_URL=http://ams:5080 PULSE_AMS_LOGIN_EMAIL=a@b.c \
#   PULSE_AMS_LOGIN_PASSWORD=x PULSE_AMS_NODE_ID=node-01 \
#   docker compose \
#     -f deploy/docker-compose.prod.yml \
#     -f deploy/docker-compose.real-ams.yml \
#     config -q

services:
  # ── Disable the mock-AMS service ─────────────────────────────────────────────
  # Assigning an unused profile means `docker compose up` will not start it.
  # Operators who want to restore mock-ams for staging can run:
  #   docker compose ... --profile mock up -d mock-ams
  mock-ams:
    profiles:
      - mock

  # ── Wire pulse to the real Ant Media Server ───────────────────────────────────
  pulse:
    environment:
      # Override the AMS source env vars set in the base and demo overrides.
      # All values come from the operator's environment — nothing is hardcoded.
      PULSE_AMS_URL: "${PULSE_AMS_URL:?PULSE_AMS_URL must be set — e.g. http://your-ams-host:5080}"
      PULSE_AMS_AUTH_TOKEN: "${PULSE_AMS_AUTH_TOKEN:-}"
      PULSE_AMS_LOGIN_EMAIL: "${PULSE_AMS_LOGIN_EMAIL:-}"
      PULSE_AMS_LOGIN_PASSWORD: "${PULSE_AMS_LOGIN_PASSWORD:-}"
      PULSE_AMS_NODE_ID: "${PULSE_AMS_NODE_ID:-standalone}"
      # PULSE_AMS_APPLICATIONS: comma-separated list, e.g. "live,vod".
      # Unset or empty = poll all AMS applications.
      PULSE_AMS_APPLICATIONS: "${PULSE_AMS_APPLICATIONS:-}"
      # Ingest health target bitrate (kbps). Real sources (e.g. an RTSP camera pull)
      # are often well below the generic 2000 default — set this to the source's
      # expected healthy bitrate so the health badge is honest. D-031.
      PULSE_INGEST_TARGET_BITRATE_KBPS: "${PULSE_INGEST_TARGET_BITRATE_KBPS:-2000}"
      # Product license (U3, D-076). Values come from deploy/.env (gitignored) —
      # the base compose has these commented out, and --env-file only interpolates
      # compose files, so WITHOUT this mapping the container never sees the key
      # and silently runs Free tier (found live at the v0.3.0 rollout).
      PULSE_LICENSE_KEY: "${PULSE_LICENSE_KEY:-}"
      PULSE_LICENSE_PUBKEY: "${PULSE_LICENSE_PUBKEY:-6403d7b49951d0220c7219e491b6525971edf10f0e64616b17023eab002ab4ba}"
