# Pulse — self-hosted deployment bundle (PRD §7.10).
# Installs beside AMS or on a dedicated VM. Target: `docker compose up -d`
# to a working dashboard in under 15 minutes, including AMS source setup.
#
# Two containers only — pulse (all-in-one binary, serves UI+API+ingest) and
# ClickHouse. Metadata store is embedded SQLite on the pulse volume by default.
# Base image digests pinned 2026-06-11 via registry HTTP API (no Docker daemon).
#
# Wave-2 changes:
#   - Full PULSE_* env surface wired (ingest, webhook, meta DSN, license, S3)
#   - Beacon ingest port 8091 exposed (internet-facing; put TLS terminator in front)
#   - PULSE_CLICKHOUSE_DSN replaces defunct PULSE_CLICKHOUSE_ADDR
#   - PULSE_AMS_AUTH_TOKEN included (required for non-anonymous AMS installs)
#   - Volumes: pulse-data now covers SQLite meta + secret key file
#   - mmdb and log-tail volume mount stubs documented
#   - Healthchecks on both containers

name: pulse

services:
  pulse:
    # TODO(INFRA-01 wave-1): switch to published image once first release ships.
    build:
      context: ..
      dockerfile: deploy/docker/pulse.Dockerfile
    expose:
      - "8090"    # UI + API — publish via an override (demo/CI) or a reverse proxy
      - "8091"    # Beacon ingest — publish via an override or TLS-terminating proxy
    environment:
      # ── Core server ──────────────────────────────────────────────────────────
      PULSE_LISTEN_ADDR: ":8090"
      PULSE_LOG_LEVEL: "info"

      # ── ClickHouse ───────────────────────────────────────────────────────────
      # PULSE_CLICKHOUSE_ADDR is NOT a valid env var; use PULSE_CLICKHOUSE_DSN.
      PULSE_CLICKHOUSE_DSN: "clickhouse://clickhouse:9000/pulse"
      PULSE_CLICKHOUSE_DATABASE: "pulse"
      PULSE_RETENTION_DAYS: "90"
      PULSE_ROLLUP_TTL_DAYS: "395"

      # ── AMS source ───────────────────────────────────────────────────────────
      PULSE_AMS_URL: "http://host.docker.internal:5080"   # adjust for your AMS host
      PULSE_AMS_NODE_ID: "standalone"
      PULSE_POLL_INTERVAL: "5s"
      # PULSE_AMS_APPLICATIONS: "live,vod"   # comma-separated; empty = all apps
      # PULSE_LOG_TAIL_PATH: /var/log/antmedia/ant-media-server-analytics.log

      # ── Sensitive values — set via .env file or secrets manager ──────────────
      # PULSE_AMS_AUTH_TOKEN: ""         # AMS REST bearer token (required in prod)
      # PULSE_SECRET_KEY: ""             # 32-byte hex; auto-generated if absent
      # PULSE_WEBHOOK_ADDR: ":8092"      # optional webhook HTTP listener
      # PULSE_WEBHOOK_SECRET: ""         # HMAC-SHA256 secret for AMS webhook

      # ── Meta store ───────────────────────────────────────────────────────────
      PULSE_META_DSN: "/var/lib/pulse/pulse_meta.db"
      # Use postgres for HA deployments:
      # PULSE_META_DSN: "postgres://pulse:password@postgres:5432/pulse_meta"

      # ── License ──────────────────────────────────────────────────────────────
      # PULSE_LICENSE_KEY: ""            # empty = Free tier (1 node, 7-day retention)
      # PULSE_LICENSE_FILE: /etc/pulse/license.sig   # air-gapped Enterprise

      # ── S3 export (Wave 2 — CSV/PDF report storage) ──────────────────────────
      # PULSE_S3_EXPORT_KEY_ID: ""
      # PULSE_S3_EXPORT_SECRET_KEY: ""
      # PULSE_S3_EXPORT_BUCKET: ""
      # PULSE_S3_EXPORT_REGION: "us-east-1"

      # ── Prometheus /metrics token (Wave 2) ───────────────────────────────────
      # PULSE_METRICS_TOKEN: ""          # set to require scrape authentication

    volumes:
      - pulse-data:/var/lib/pulse         # SQLite meta store + secret key cache
      # Mount the AMS analytics log read-only when Pulse runs on the AMS host:
      # - /var/log/antmedia:/var/log/antmedia:ro
      # Mount MaxMind mmdb for geo enrichment (Wave 2):
      # - /etc/pulse/GeoLite2-City.mmdb:/var/lib/pulse/GeoLite2-City.mmdb:ro
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/healthz"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 5
    restart: unless-stopped

  clickhouse:
    # clickhouse/clickhouse-server:24.8
    # Digest pinned 2026-06-11 via registry HTTP API (no Docker daemon).
    image: clickhouse/clickhouse-server@sha256:1ffa82edee000a42c09313bd9f1293d94c570aee74babc1b3ca9983a35fa597b
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      # Low-footprint config (2-vCPU tuning) — generated by INFRA-01 wave-1.
      # Uncomment when deploy/config/clickhouse-low-footprint.xml is present:
      # - ./config/clickhouse-low-footprint.xml:/etc/clickhouse-server/config.d/pulse.xml:ro
    expose:
      - "9000"    # ClickHouse native protocol (cluster-internal only)
      - "8123"    # ClickHouse HTTP (cluster-internal only)
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 12
    restart: unless-stopped

volumes:
  pulse-data:
  clickhouse-data:
