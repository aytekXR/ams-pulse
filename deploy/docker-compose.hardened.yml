# Pulse — hardened production-shaped override.
#
# Usage (local verify, self-contained):
#   docker compose -p pulse-hardened \
#     -f deploy/docker-compose.yml \
#     -f deploy/docker-compose.hardened.yml \
#     --env-file deploy/.env \
#     up -d --build
#
# This file is a COMPLETE override:  base + hardened = production-shaped stack.
# It includes mock-ams + pulse-migrate so it can be verified WITHOUT external
# infra.  A separate real-ams override (not authored here) swaps mock-ams for
# a real AMS endpoint.
#
# TLS: terminated OUTSIDE this stack by nginx on the host (vhosts in
# deploy/nginx/, cert at /etc/letsencrypt/live/beyondkaira.com/). This overlay
# publishes NO ports at all; layer deploy/docker-compose.nginx-edge.yml on top
# to publish the app's listeners on 127.0.0.1 for host-nginx — or just use the
# consolidated deploy/docker-compose.prod.yml, which is base + hardened +
# nginx-edge in one file.
#
# Required env vars (put in deploy/.env — see deploy/.env.example):
#   PULSE_SECRET_KEY, CLICKHOUSE_USER, CLICKHOUSE_PASSWORD

name: pulse-hardened

services:

  # ── Pulse application ────────────────────────────────────────────────────────
  pulse:
    # Remove ALL host port publishing — the nginx-edge overlay (or the
    # consolidated prod file) re-publishes the listeners on 127.0.0.1 only.
    ports: !override []
    # ── Container hardening (S80/D-142) ──────────────────────────────────────────
    # Defense-in-depth on the internet-facing app container (it parses untrusted
    # beacon + webhook input). The binary is a static (CGO_ENABLED=0) NON-root
    # process (USER pulse in the Dockerfile) that binds only high ports (8090-8092,
    # no NET_BIND_SERVICE needed) and writes exclusively to the pulse-data volume
    # (SQLite meta store + secret key + report artifacts, see PULSE_REPORTS_DIR
    # below), so it needs no Linux capabilities and no writable root filesystem.
    #   - read_only: root fs is immutable; the /var/lib/pulse volume stays writable.
    #   - tmpfs /tmp: absorbs any transient temp write (e.g. modernc SQLite scratch).
    #   - cap_drop ALL: no capabilities are required.
    #   - no-new-privileges: block setuid/setgid privilege escalation.
    # Verified via an isolated `docker run --read-only --cap-drop ALL` boot of the
    # release image (zero EROFS errors) + the prod roll-forward 5-check smoke.
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512m
          # 1.0 → 0.5 (S10/D-068): the O(N²) rebuildSnapshot hot path that caused
          # 147%-of-a-core bursts at 500 streams has been eliminated. Incremental
          # O(1)-per-event snapshot maintenance (see ARCHITECTURE.md §4 A10 budget
          # and §7) reduces poll-cycle CPU by ~365× at 500 streams. D-065 cap
          # mitigation reverted; 0.5 vCPU restored.
          cpus: "0.5"
    environment:
      PULSE_CLICKHOUSE_DSN: "clickhouse://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:9000/pulse"
      PULSE_CLICKHOUSE_DATABASE: "pulse"
      PULSE_AMS_URL: "http://mock-ams:9090"
      PULSE_AMS_NODE_ID: "standalone"
      PULSE_POLL_INTERVAL: "5s"
      PULSE_MIGRATIONS_DIR: "/contracts/db/clickhouse"
      PULSE_META_DDL_PATH: "/contracts/db/meta/0001_init.sql"
      PULSE_SECRET_KEY: "${PULSE_SECRET_KEY:-}"
      PULSE_WEBHOOK_ADDR: ":8092"
      PULSE_WEBHOOK_SECRET: "${PULSE_WEBHOOK_SECRET:-}"
      PULSE_META_DSN: "/var/lib/pulse/pulse_meta.db"
      # Report artifacts on the persistent volume (S80/D-142). The code default is
      # the RELATIVE "pulse-reports", which under WORKDIR "/" writes to the ephemeral
      # container root — artifacts are lost on every redeploy AND it breaks read_only.
      # Pointing it at the pulse-data volume persists artifacts and keeps root fs RO.
      PULSE_REPORTS_DIR: "/var/lib/pulse/reports"
      PULSE_LOG_LEVEL: "info"
      PULSE_RETENTION_DAYS: "90"
      PULSE_ROLLUP_TTL_DAYS: "395"
    volumes:
      - ../contracts:/contracts:ro
    depends_on:
      clickhouse:
        condition: service_healthy
      pulse-migrate:
        condition: service_completed_successfully

  # ── ClickHouse with authentication ──────────────────────────────────────────
  clickhouse:
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"
    environment:
      CLICKHOUSE_USER: "${CLICKHOUSE_USER}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD}"
      # CLICKHOUSE_SKIP_USER_SETUP must NOT be set here — auth must be enforced.
    healthcheck:
      # Override the base healthcheck to pass credentials once auth is enabled.
      test: ["CMD", "clickhouse-client", "--user", "${CLICKHOUSE_USER}", "--password", "${CLICKHOUSE_PASSWORD}", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 12

  # ── Mock AMS (self-contained; real-ams override replaces this) ───────────────
  mock-ams:
    # golang:1.25
    # Digest pinned 2026-07-09; to refresh: docker pull golang:1.25 && docker image inspect golang:1.25 --format '{{index .RepoDigests 0}}'
    image: golang@sha256:3aff6657219a4d9c14e27fb1d8976c49c29fddb70ba835014f477e1c70636647
    working_dir: /src/qa/mock-ams
    command: ["go", "run", ".", "-addr", ":9090", "-app", "live"]
    volumes:
      - ../:/src:ro
      - go-build-cache:/root/.cache/go-build
    # Internal only — no host port; pulse reaches it via the default network.
    restart: unless-stopped

  # ── Schema migration one-shot ────────────────────────────────────────────────
  pulse-migrate:
    build:
      context: ..
      dockerfile: deploy/docker/pulse.Dockerfile
    entrypoint: ["pulse", "migrate"]
    environment:
      # Authenticated DSN — required once CLICKHOUSE_USER/PASSWORD are set.
      PULSE_CLICKHOUSE_DSN: "clickhouse://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:9000/pulse"
      PULSE_CLICKHOUSE_DATABASE: "pulse"
      PULSE_MIGRATIONS_DIR: "/contracts/db/clickhouse"
      PULSE_META_DSN: "/tmp/pulse_meta.db"
      # D-052 fail-closed guard: migrate refuses to boot without a >=16-byte key
      # (the scratch meta DSN above is non-:memory:, so the guard applies here too).
      PULSE_SECRET_KEY: "${PULSE_SECRET_KEY:-}"
    volumes:
      - ../contracts:/contracts:ro
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: "no"

volumes:
  go-build-cache:
