# Pulse — Docker secrets opt-in overlay (Item 5: _FILE convention).
#
# PURPOSE
# -------
# This overlay wires Docker (Compose) file-based secrets so secrets never
# appear in environment variables or `docker inspect` output.  It is OPT-IN:
# production keeps env-based config unchanged; add this file only when you
# want file-based delivery.
#
# HOW _FILE RESOLUTION WORKS
# --------------------------
# For each secret-bearing variable NAME, Pulse's getSecret() helper resolves:
#   1. If ${NAME}_FILE is set → read the file at that path, trim trailing
#      newline, use that value.  A missing/unreadable file = hard startup error.
#   2. Otherwise → fall back to ${NAME}.
# "File wins" when both are set because the file is the deliberate operator
# choice — the plain env var below is intentionally set to "" so the
# hardened overlay's :? guard is satisfied without exposing the secret.
#
# INTERACTION WITH THE HARDENED OVERLAY
# --------------------------------------
# deploy/docker-compose.hardened.yml uses ${PULSE_SECRET_KEY:-} and
# ${PULSE_WEBHOOK_SECRET:-} (empty-default, not :? error-on-missing).  This
# allows compose config validation to pass even when the plain env vars are
# unset — the application performs its own length validation at startup and
# rejects an empty or short PULSE_SECRET_KEY with a clear error message.
#
# The _FILE vars set below take precedence at runtime via getSecret resolution,
# so the empty plain env values are never used by the application.
#
# Usage — add AFTER the hardened overlay:
#
#   docker compose -p pulse-prod \
#     -f deploy/docker-compose.yml \
#     -f deploy/docker-compose.hardened.yml \
#     -f deploy/docker-compose.prod-tls.yml \
#     -f deploy/docker-compose.secrets.yml \
#     up -d
#
# Secret file setup (one-time, operator-managed):
#
#   mkdir -p deploy/secrets
#   openssl rand -hex 32 > deploy/secrets/pulse_secret_key.txt
#   openssl rand -hex 32 > deploy/secrets/pulse_webhook_secret.txt
#   # optional (leave as empty files if not used):
#   touch deploy/secrets/pulse_ams_login_password.txt
#   touch deploy/secrets/pulse_metrics_token.txt
#   chmod 600 deploy/secrets/*.txt
#
# See deploy/secrets/README.md for full instructions and a rotate-secrets
# runbook.  deploy/secrets/ is gitignored — never commit secret files.

# ── Docker Compose top-level secrets ─────────────────────────────────────────
# file: paths are relative to THIS file's directory (deploy/).
secrets:
  pulse_secret_key:
    file: ./secrets/pulse_secret_key.txt
  pulse_webhook_secret:
    file: ./secrets/pulse_webhook_secret.txt
  pulse_ams_login_password:
    file: ./secrets/pulse_ams_login_password.txt
  pulse_metrics_token:
    file: ./secrets/pulse_metrics_token.txt

services:
  pulse:
    secrets:
      - pulse_secret_key
      - pulse_webhook_secret
      - pulse_ams_login_password
      - pulse_metrics_token
    environment:
      # Override the hardened overlay's :? guards with empty strings.
      # The _FILE vars below take precedence via getSecret resolution —
      # the empty plain value is never read by the application.
      PULSE_SECRET_KEY: ""
      PULSE_WEBHOOK_SECRET: ""
      # Non-guarded vars — set to "" so any stale env value is ignored.
      PULSE_AMS_LOGIN_PASSWORD: ""
      PULSE_METRICS_TOKEN: ""
      # Point each secret var at its Docker-mounted file.
      PULSE_SECRET_KEY_FILE: /run/secrets/pulse_secret_key
      PULSE_WEBHOOK_SECRET_FILE: /run/secrets/pulse_webhook_secret
      PULSE_AMS_LOGIN_PASSWORD_FILE: /run/secrets/pulse_ams_login_password
      PULSE_METRICS_TOKEN_FILE: /run/secrets/pulse_metrics_token
      # Optional: deliver the AMS REST bearer token via a Docker secret file.
      # Uncomment and add pulse_ams_auth_token to the secrets block above if used.
      # PULSE_AMS_AUTH_TOKEN: ""
      # PULSE_AMS_AUTH_TOKEN_FILE: /run/secrets/pulse_ams_auth_token
