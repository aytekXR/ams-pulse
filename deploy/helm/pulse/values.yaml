# Pulse Helm chart — default values for a 2-vCPU Free-tier install.
# Override via --set or -f my-values.yaml.
# Full values table documented in README.md.

# ---------------------------------------------------------------------------
# Pulse binary (collector + API + alerter, all-in-one)
# ---------------------------------------------------------------------------
pulse:
  image:
    # Canonical image: ghcr.io/aytekxr/ams-pulse (published by release.yml on every semver tag).
    # Tags produced: {{version}}, {{major}}.{{minor}}, {{major}}, 'latest' (non-prerelease only).
    # Images are cosign-signed (keyless/Sigstore OIDC) at the manifest digest.
    repository: ghcr.io/aytekxr/ams-pulse
    tag: "0.4.1"
    pullPolicy: IfNotPresent
    # Digest pinning (recommended for production): set to the manifest digest to get
    # an immutable pull regardless of tag movement.
    # When set, the rendered image reference is repo:tag@digest (tag is preserved for
    # readability; Kubernetes uses the digest for the actual pull).
    #
    # To obtain the digest after a release:
    #   docker pull ghcr.io/aytekxr/ams-pulse:0.4.1
    #   docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/aytekxr/ams-pulse:0.4.1
    # Or from the cosign SBOM attestation:
    #   cosign verify ghcr.io/aytekxr/ams-pulse:0.4.1 | jq -r '.[0].critical.image.docker-manifest-digest'
    digest: ""   # e.g. sha256:abc123...

  replicaCount: 1

  # Resources: tuned for a 2-vCPU / 2 GB VM (ARCHITECTURE §3.6 Free-tier budget).
  # CPU limit 1000m → 500m (S10/D-068): D-065 cap mitigation reverted. The O(N²)
  # rebuildSnapshot hot path is eliminated; O(1)-per-event incremental maintenance
  # reduces poll-cycle CPU by ~365× at 500 streams (ARCHITECTURE §4 A10 budget).
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  # HTTP API + UI port.
  listenAddr: ":8090"

  # Beacon ingest port. This is the ONLY internet-facing surface.
  # Set ingressIngest.enabled=true and configure TLS termination at the ingress.
  ingestListenAddr: ":8091"

  # AMS source configuration. Set authToken in a Secret (see secretRef).
  ams:
    url: "http://localhost:5080"
    nodeId: "standalone"
    # authToken: set via secretRef.amsAuthToken (never in values)
    applications: ""        # comma-separated; empty = all apps
    pollInterval: "5s"

  # ClickHouse connection. Overridden to point at the bundled StatefulSet by default.
  # Set this if clickhouse.enabled=false and you provide an external ClickHouse.
  clickhouse:
    dsn: ""                  # auto-set to clickhouse://pulse-clickhouse:9000/pulse when clickhouse.enabled=true
    database: "pulse"
    migrationsDir: ""        # empty = use embedded migrations

  # Meta store. SQLite on PVC by default; set postgres.enabled=true for HA.
  meta:
    dsn: ""                  # auto-set to /var/lib/pulse/pulse_meta.db when empty
    # secretKey: set via secretRef.secretKey (never in values)

  # License (empty = Free tier, no phone-home).
  license:
    key: ""
    offlineFile: ""

  # Collector / ingest settings.
  # Webhook server (B7 per-source webhooks, PULSE_WEBHOOK_ADDR).
  # Set to ":8092" to enable; keep in sync with webhookService.port.
  # Routes served: /webhook/ams  and  /webhook/ams/{source_name}
  # Secret rotation (per-source secrets stored in the meta store) requires a pod restart.
  webhookAddr: ""           # address for webhook HTTP server; empty = disabled
  webhookSecret: ""         # set via secretRef.webhookSecret instead

  # Retention.
  retentionDays: 90
  rollupTTLDays: 395

  # Observability.
  logLevel: "info"          # debug|info|warn|error
  # metricsToken: set via secretRef.metricsToken (Wave 2 — not yet enforced by binary)

  # Extra environment variables to inject (list of {name, value} or {name, valueFrom}).
  extraEnv: []

  # Reference to an existing Secret that provides sensitive values.
  # IMPORTANT: PULSE_SECRET_KEY is required — the binary crashes at boot without it
  # (secretKeyRef optional: false; pod will fail to schedule if the key is absent).
  #
  # secretRef:
  #   name: pulse-secrets
  # Keys expected in that Secret:
  #   PULSE_SECRET_KEY          (REQUIRED) 32-byte hex AES-256-GCM key
  #   PULSE_AMS_AUTH_TOKEN      (optional) AMS REST bearer token
  #   PULSE_WEBHOOK_SECRET      (optional) HMAC-SHA256 global webhook secret
  #   PULSE_METRICS_TOKEN       (optional) Prometheus scrape token (Wave 2)
  #   PULSE_POSTGRES_DSN        (required when postgres.enabled=true)
  #   PULSE_S3_EXPORT_KEY_ID    (optional, when s3Export.enabled=true)
  #   PULSE_S3_EXPORT_SECRET_KEY (optional, when s3Export.enabled=true)
  secretRef: {}

  # Volume mounts for the pulse container (e.g., AMS log, mmdb, custom config).
  extraVolumeMounts: []
  extraVolumes: []

  service:
    type: ClusterIP
    apiPort: 8090

  serviceAccount:
    create: true
    name: ""
    annotations: {}

  podAnnotations: {}
  podSecurityContext:
    fsGroup: 1000

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

  # PVC for SQLite meta store + license cache.
  persistence:
    enabled: true
    storageClass: ""       # "" = cluster default
    size: 2Gi
    accessMode: ReadWriteOnce

  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# Beacon ingest — the ONLY internet-facing Service.
# Annotated with cloud LB annotations (set in ingestService.annotations).
# ---------------------------------------------------------------------------
ingestService:
  # Expose the beacon ingest port. Set type=LoadBalancer for internet access.
  # IMPORTANT: always terminate TLS at the load balancer / ingress — the pulse
  # binary does not handle TLS directly.
  enabled: true
  type: ClusterIP         # change to LoadBalancer or NodePort for internet exposure
  port: 8091
  # nodePort: 30091      # uncomment when type=NodePort
  # annotations for cloud LB (e.g., service.beta.kubernetes.io/aws-load-balancer-*)
  annotations: {}

# ---------------------------------------------------------------------------
# Ingress for API + UI (optional — internal access; TLS at ingress level)
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: pulse.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ---------------------------------------------------------------------------
# Ingress for beacon ingest (optional — public internet-facing)
# ---------------------------------------------------------------------------
ingressIngest:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ingest.pulse.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ---------------------------------------------------------------------------
# Webhook Service (B7 per-source webhooks)
# Pulse binds PULSE_WEBHOOK_ADDR (:8092 by default) for AMS webhook callbacks.
# Routes: /webhook/ams  and  /webhook/ams/{source_name}
# Enable this Service when pulse.webhookAddr is set so AMS (or an ingress)
# can reach the webhook listener.  Keep webhookService.port in sync with the
# port number in pulse.webhookAddr.
# ---------------------------------------------------------------------------
webhookService:
  enabled: false            # set true when pulse.webhookAddr is set
  type: ClusterIP
  port: 8092
  annotations: {}

# ---------------------------------------------------------------------------
# Ingress for webhook (optional — for external AMS webhook callbacks)
# ---------------------------------------------------------------------------
ingressWebhook:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: webhook.pulse.example.com
      paths:
        - path: /webhook/ams
          pathType: Prefix
  tls: []

# ---------------------------------------------------------------------------
# ClickHouse — bundled single-replica StatefulSet (low-footprint, 2-vCPU tuning)
# Decision: bundled StatefulSet over bitnami/clickhouse sub-chart (see Chart.yaml).
# ---------------------------------------------------------------------------
clickhouse:
  # Set false to use an external ClickHouse and provide externalDSN below.
  enabled: true

  # External DSN override (only used when enabled=false).
  externalDSN: ""

  # ClickHouse authentication — REQUIRED for production.
  # SECURITY: the default ClickHouse image ships the 'default' user with an empty
  # password accessible on port 9000 to anyone with network access. In production
  # you MUST set existingSecret to wire a named user with a strong password.
  # Parity with compose: docker-compose.hardened.yml sets CLICKHOUSE_USER +
  # CLICKHOUSE_PASSWORD; the ClickHouse image creates the named user at first boot.
  #
  # Create the Secret before install:
  #   CH_PASS=$(openssl rand -hex 16)
  #   kubectl create secret generic pulse-clickhouse-secret \
  #     --from-literal=CLICKHOUSE_USER=pulse \
  #     --from-literal=CLICKHOUSE_PASSWORD="${CH_PASS}" \
  #     --from-literal=PULSE_CLICKHOUSE_DSN="clickhouse://pulse:${CH_PASS}@pulse-clickhouse:9000/pulse"
  #
  # Required Secret keys:
  #   CLICKHOUSE_USER       — named user the image creates at first boot (e.g. pulse)
  #   CLICKHOUSE_PASSWORD   — strong random password (min 16 chars)
  #   PULSE_CLICKHOUSE_DSN  — full authenticated DSN for the pulse binary
  #                           format: clickhouse://USER:PASS@<release>-clickhouse:9000/<database>
  #
  # When existingSecret is empty the 'default' user (no password) is used.
  # This is acceptable only for isolated dev/test clusters with NetworkPolicy.
  auth:
    existingSecret: ""   # REQUIRED for production; empty = unauthenticated (dev/test only)

  image:
    # clickhouse/clickhouse-server:24.8
    # Pin to digest in production.
    repository: clickhouse/clickhouse-server
    tag: "24.8"
    pullPolicy: IfNotPresent

  # wait-for-clickhouse init container image (only rendered when clickhouse.enabled=true).
  # busybox:1.36
  # Digest pinned 2026-07-09; to refresh: docker pull busybox:1.36 && docker image inspect busybox:1.36 --format '{{index .RepoDigests 0}}'
  waitImage:
    repository: busybox
    tag: "1.36"
    digest: "sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662"
    pullPolicy: IfNotPresent

  # Resources: tuned for 2-vCPU / 1 GB ClickHouse footprint.
  # ~1–2 GB per 1M viewer-sessions; start conservatively (ARCHITECTURE §4).
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

  persistence:
    enabled: true
    storageClass: ""
    size: 20Gi
    accessMode: ReadWriteOnce

  # Low-footprint tuning (see deploy/config/clickhouse-low-footprint.xml).
  # These are injected into a ConfigMap mounted into the container.
  config:
    maxMemoryUsage: "536870912"          # 512 MB
    maxMemoryUsageForAllQueries: "805306368"  # 768 MB
    maxConcurrentQueries: 16
    maxThreads: 2
    backgroundPoolSize: 2
    backgroundSchedulePoolSize: 2
    uncompressedCacheSize: "67108864"    # 64 MB
    markCacheSize: "67108864"            # 64 MB

  service:
    type: ClusterIP
    nativePort: 9000
    httpPort: 8123

# ---------------------------------------------------------------------------
# Postgres meta store (optional — for HA deployments)
# When enabled, pulse uses Postgres instead of SQLite for alert rules,
# API tokens, and channel configs.
# ---------------------------------------------------------------------------
postgres:
  # Set true to provision an in-cluster Postgres StatefulSet.
  # For production, use an external managed Postgres and set externalDSN
  # via secretRef (PULSE_POSTGRES_DSN).
  enabled: false

  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

  persistence:
    enabled: true
    storageClass: ""
    size: 5Gi
    accessMode: ReadWriteOnce

  auth:
    database: "pulse_meta"
    username: "pulse"
    # password: set via secretRef (PULSE_POSTGRES_DSN includes credentials)

# ---------------------------------------------------------------------------
# S3 export (optional — CSV/PDF report storage, Wave 2)
# ---------------------------------------------------------------------------
s3Export:
  enabled: false
  bucket: ""
  region: "us-east-1"
  endpoint: ""            # empty = AWS S3
  # keyId and secretKey: set via secretRef (PULSE_S3_EXPORT_KEY_ID, PULSE_S3_EXPORT_SECRET_KEY)

# ---------------------------------------------------------------------------
# mmdb geo-enrichment database (optional — Wave 2)
# Mount a MaxMind GeoLite2-City.mmdb for geo/UA enrichment.
# ---------------------------------------------------------------------------
mmdb:
  enabled: false
  # Provide a PVC pre-loaded with the mmdb file, or use an initContainer.
  # claimName: mmdb-pvc
  # mountPath: /var/lib/pulse/GeoLite2-City.mmdb
  # subPath: GeoLite2-City.mmdb
  claimName: ""
  mountPath: "/var/lib/pulse/GeoLite2-City.mmdb"
  subPath: "GeoLite2-City.mmdb"

# ---------------------------------------------------------------------------
# Backup CronJob — mirrors the compose backup sidecar (docker-compose.backup.yml).
# Runs pulse-backup.sh in "once" mode on the configured schedule.
#
# DISABLED BY DEFAULT — parity with compose: the backup overlay is opt-in
# (docker-compose.backup.yml is not included in the base stack).
# Enable when you have:
#   1. clickhouse.auth.existingSecret set (named CH user for clickhouse-client auth)
#   2. A backup PVC provisioned (or set backup.persistence.existingClaim)
#
# What it backs up:
#   - ClickHouse: BACKUP DATABASE pulse TO Disk('backups', ...) (zip archive)
#   - SQLite meta store: file copy with WAL consistency (see pulse-backup.sh header)
#
# S3 push: NOT enabled by default. The ClickHouse image does not ship aws-cli.
# To enable S3 push, build a custom sidecar image on top of the CH base image
# that adds aws-cli, then set backup.image.repository + digest accordingly and
# set PULSE_BACKUP_S3_BUCKET / PULSE_BACKUP_S3_PREFIX / PULSE_BACKUP_S3_REGION
# via backup.extraEnv.
#
# NOTE: ClickHouse requires the 'backups' disk to be enabled (this chart wires it
# automatically via the clickhouse ConfigMap when backup.enabled=true).
# ---------------------------------------------------------------------------
backup:
  enabled: false   # Set true to deploy the CronJob + wire the backup disk in ClickHouse

  # Cron schedule (default: 02:00 UTC daily).
  schedule: "0 2 * * *"

  # Image: same digest-pinned ClickHouse image as the compose sidecar.
  # Ships clickhouse-client + bash (no additional image needed for local backups).
  # IMPORTANT: use the digest (not just tag) to guarantee the same binary as the
  # script was tested against. aws-cli is NOT in this image (see S3 note above).
  image:
    repository: clickhouse/clickhouse-server
    # Digest matches the compose sidecar image (docker-compose.backup.yml):
    #   clickhouse/clickhouse-server@sha256:1ffa82edee000a42c09313bd9f1293d94c570aee74babc1b3ca9983a35fa597b
    digest: "sha256:1ffa82edee000a42c09313bd9f1293d94c570aee74babc1b3ca9983a35fa597b"
    pullPolicy: IfNotPresent

  # PVC for backup artifacts (shared read-write with the ClickHouse StatefulSet).
  # When existingClaim is empty a new PVC named <release>-backups is created.
  persistence:
    existingClaim: ""
    storageClass: ""         # "" = cluster default
    size: 10Gi
    accessMode: ReadWriteOnce

  # Extra env vars for the backup container (e.g., S3 credentials, custom BACKUP_DIR).
  # Format: list of {name, value} or {name, valueFrom}.
  extraEnv: []

  resources:
    limits:
      cpu: "250m"
      memory: "256Mi"
