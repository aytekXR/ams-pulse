{{- if .Values.clickhouse.enabled -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "pulse.fullname" . }}-clickhouse
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
spec:
  replicas: 1
  serviceName: {{ include "pulse.fullname" . }}-clickhouse
  selector:
    matchLabels:
      {{- include "pulse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: clickhouse
  template:
    metadata:
      labels:
        {{- include "pulse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: clickhouse
    spec:
      securityContext:
        fsGroup: 101
      containers:
        - name: clickhouse
          image: "{{ .Values.clickhouse.image.repository }}:{{ .Values.clickhouse.image.tag }}"
          imagePullPolicy: {{ .Values.clickhouse.image.pullPolicy }}
          {{- if .Values.clickhouse.auth.existingSecret }}
          # ClickHouse auth: named user created at first boot from these env vars.
          # Parity with docker-compose.hardened.yml which sets CLICKHOUSE_USER + CLICKHOUSE_PASSWORD.
          # SECURITY: remove the default empty-password user by providing a named user here.
          env:
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.clickhouse.auth.existingSecret }}
                  key: CLICKHOUSE_USER
                  optional: false
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.clickhouse.auth.existingSecret }}
                  key: CLICKHOUSE_PASSWORD
                  optional: false
          {{- end }}
          ports:
            - name: native
              containerPort: 9000
              protocol: TCP
            - name: http
              containerPort: 8123
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: config
              mountPath: /etc/clickhouse-server/config.xml
              subPath: config.xml
            - name: config
              mountPath: /etc/clickhouse-server/users.xml
              subPath: users.xml
            {{- if .Values.backup.enabled }}
            # Backup disk config — enables BACKUP DATABASE ... TO Disk('backups', ...) SQL.
            - name: config
              mountPath: /etc/clickhouse-server/config.d/backup-config.xml
              subPath: backup-config.xml
            # Shared backup volume — the CronJob writes here; ClickHouse BACKUP writes here.
            - name: backups
              mountPath: /backups
            {{- end }}
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.clickhouse.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "pulse.fullname" . }}-clickhouse-config
        {{- if .Values.backup.enabled }}
        - name: backups
          persistentVolumeClaim:
            claimName: {{ .Values.backup.persistence.existingClaim | default (printf "%s-backups" (include "pulse.fullname" .)) }}
        {{- end }}
  {{- if .Values.clickhouse.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [{{ .Values.clickhouse.persistence.accessMode | quote }}]
        {{- if .Values.clickhouse.persistence.storageClass }}
        storageClassName: {{ .Values.clickhouse.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.clickhouse.persistence.size }}
  {{- else }}
      # No persistence — data is ephemeral (not recommended for production).
      volumes:
        - name: data
          emptyDir: {}
  {{- end }}
{{- end }}
