apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pulse
  namespace: default
  labels:
    helm.sh/chart: pulse-0.1.0
    app.kubernetes.io/name: pulse
    app.kubernetes.io/instance: pulse
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
      - pulse.example.com
      secretName: pulse-tls
  rules:
    - host: "pulse.example.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pulse
                port:
                  name: api
