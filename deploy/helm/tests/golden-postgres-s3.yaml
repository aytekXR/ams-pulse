# Source: pulse/templates/ingress.yaml
# Beacon ingest ingress — internet-facing; ensure TLS is configured.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pulse-ingest
  namespace: default
  labels:
    helm.sh/chart: pulse-0.1.0
    app.kubernetes.io/name: pulse
    app.kubernetes.io/instance: pulse
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: pulse-ingest
  annotations:
    # SECURITY: This ingress is internet-facing. TLS is required.
    pulse.io/internet-facing: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
      - ingest.pulse.example.com
      secretName: pulse-ingest-tls
  rules:
    - host: "ingest.pulse.example.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pulse-ingest
                port:
                  name: ingest
