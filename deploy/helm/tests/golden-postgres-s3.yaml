# Source: pulse/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulse
  namespace: default
  labels:
    helm.sh/chart: pulse-0.1.0
    app.kubernetes.io/name: pulse
    app.kubernetes.io/instance: pulse
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: pulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pulse
      app.kubernetes.io/instance: pulse
      app.kubernetes.io/component: pulse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pulse
        app.kubernetes.io/instance: pulse
        app.kubernetes.io/component: pulse
    spec:
      serviceAccountName: pulse
      securityContext:
        fsGroup: 1000
      initContainers:
        # Wait for ClickHouse to be ready before starting pulse.
        - name: wait-clickhouse
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for ClickHouse at pulse-clickhouse:8123..."
              until wget -qO- http://pulse-clickhouse:8123/ping > /dev/null 2>&1; do
                echo "ClickHouse not ready, retrying in 3s..."
                sleep 3
              done
              echo "ClickHouse ready."
      containers:
        - name: pulse
          image: "ghcr.io/pulse-analytics/pulse:0.1.0"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: false
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
          command: ["pulse", "serve"]
          ports:
            - name: api
              containerPort: 8090
              protocol: TCP
            - name: ingest
              containerPort: 8091
              protocol: TCP
          env:
            # ── Core server ──────────────────────────────────────────────
            - name: PULSE_LISTEN_ADDR
              value: ":8090"
            # ── ClickHouse ───────────────────────────────────────────────
            - name: PULSE_CLICKHOUSE_DSN
              value: "clickhouse://pulse-clickhouse:9000/pulse"
            - name: PULSE_CLICKHOUSE_DATABASE
              value: "pulse"
            - name: PULSE_RETENTION_DAYS
              value: "90"
            - name: PULSE_ROLLUP_TTL_DAYS
              value: "395"
            # ── AMS source ───────────────────────────────────────────────
            - name: PULSE_AMS_URL
              value: "http://ams.example.com:5080"
            - name: PULSE_AMS_NODE_ID
              value: "node-01"
            - name: PULSE_POLL_INTERVAL
              value: "5s"
            # ── Meta store ───────────────────────────────────────────────
            # ── Collector extras (optional) ──────────────────────────────
            # ── License ──────────────────────────────────────────────────
            # ── Observability ────────────────────────────────────────────
            - name: PULSE_LOG_LEVEL
              value: "debug"
            # ── Secrets from secretRef ────────────────────────────────────
            - name: PULSE_AMS_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pulse-secrets
                  key: PULSE_AMS_AUTH_TOKEN
                  optional: true
            - name: PULSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: pulse-secrets
                  key: PULSE_SECRET_KEY
                  optional: true
            - name: PULSE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: pulse-secrets
                  key: PULSE_WEBHOOK_SECRET
                  optional: true
            - name: PULSE_METRICS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pulse-secrets
                  key: PULSE_METRICS_TOKEN
                  optional: true
            - name: PULSE_META_DSN
              valueFrom:
                secretKeyRef:
                  name: pulse-secrets
                  key: PULSE_POSTGRES_DSN
                  optional: false
            - name: PULSE_S3_EXPORT_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: pulse-secrets
                  key: PULSE_S3_EXPORT_KEY_ID
                  optional: true
            - name: PULSE_S3_EXPORT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: pulse-secrets
                  key: PULSE_S3_EXPORT_SECRET_KEY
                  optional: true
            # ── Extra env from values.yaml ────────────────────────────────
          livenessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/pulse
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pulse-data

