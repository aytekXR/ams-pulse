# PVC for pulse meta store (SQLite) + license cache.
# Not needed when postgres.enabled=true (meta store is in Postgres then).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pulse-data
  namespace: default
  labels:
    helm.sh/chart: pulse-0.1.0
    app.kubernetes.io/name: pulse
    app.kubernetes.io/instance: pulse
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: pulse
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
