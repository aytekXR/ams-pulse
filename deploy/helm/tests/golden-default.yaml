# Source: pulse/templates/configmap-clickhouse.yaml
# ClickHouse low-footprint configuration for 2-vCPU Free-tier installs.
# Memory limits, concurrency caps, and cache sizes are tuned conservatively
# for the PRD §7.10 deployment target: 2 vCPU, 2–4 GB RAM sidecar.
# Adjust clickhouse.config values in values.yaml for larger installs.
apiVersion: v1
kind: ConfigMap
metadata:
  name: pulse-clickhouse-config
  namespace: default
  labels:
    helm.sh/chart: pulse-0.1.0
    app.kubernetes.io/name: pulse
    app.kubernetes.io/instance: pulse
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: clickhouse
data:
  config.xml: |
    <clickhouse>
      <!-- Storage path — mounted from PVC -->
      <path>/var/lib/clickhouse/</path>
      <tmp_path>/var/lib/clickhouse/tmp/</tmp_path>
      <user_data_path>/var/lib/clickhouse/user_data/</user_data_path>

      <!-- Ports -->
      <tcp_port>9000</tcp_port>
      <http_port>8123</http_port>
      <interserver_http_port>9009</interserver_http_port>

      <!-- Listen on all interfaces inside the pod -->
      <listen_host>0.0.0.0</listen_host>

      <!-- Logging: errors only to reduce I/O on small VMs -->
      <logger>
        <level>error</level>
        <console>1</console>
      </logger>

      <!-- Low-footprint memory limits (2-vCPU tier) -->
      <max_server_memory_usage>536870912</max_server_memory_usage>
      <max_concurrent_queries>16</max_concurrent_queries>
      <uncompressed_cache_size>67108864</uncompressed_cache_size>
      <mark_cache_size>67108864</mark_cache_size>

      <!-- Background pool sizing -->
      <background_pool_size>2</background_pool_size>
      <background_schedule_pool_size>2</background_schedule_pool_size>

      <!-- Max threads per query -->
      <max_threads>2</max_threads>

      <!-- Users config loaded from separate ConfigMap key -->
      <users_config>/etc/clickhouse-server/users.xml</users_config>
    </clickhouse>

  users.xml: |
    <clickhouse>
      <profiles>
        <default>
          <max_memory_usage>536870912</max_memory_usage>
          <max_memory_usage_for_all_queries>805306368</max_memory_usage_for_all_queries>
        </default>
      </profiles>
      <users>
        <default>
          <!-- DEVELOPMENT/TEST ONLY: no password. Set clickhouse.auth.existingSecret in production. -->
          <password></password>
          <profile>default</profile>
          <quota>default</quota>
          <networks>
            <ip>::/0</ip>
          </networks>
          <access_management>1</access_management>
        </default>
      </users>
      <quotas>
        <default></default>
      </quotas>
    </clickhouse>
