# Source: pulse/templates/statefulset-clickhouse.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pulse-clickhouse
  namespace: default
  labels:
    helm.sh/chart: pulse-0.1.0
    app.kubernetes.io/name: pulse
    app.kubernetes.io/instance: pulse
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: clickhouse
spec:
  replicas: 1
  serviceName: pulse-clickhouse
  selector:
    matchLabels:
      app.kubernetes.io/name: pulse
      app.kubernetes.io/instance: pulse
      app.kubernetes.io/component: clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pulse
        app.kubernetes.io/instance: pulse
        app.kubernetes.io/component: clickhouse
    spec:
      securityContext:
        fsGroup: 101
      containers:
        - name: clickhouse
          image: "clickhouse/clickhouse-server:24.8"
          imagePullPolicy: IfNotPresent
          ports:
            - name: native
              containerPort: 9000
              protocol: TCP
            - name: http
              containerPort: 8123
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: config
              mountPath: /etc/clickhouse-server/config.xml
              subPath: config.xml
            - name: config
              mountPath: /etc/clickhouse-server/users.xml
              subPath: users.xml
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: pulse-clickhouse-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
