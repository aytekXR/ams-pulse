# Pulse — CONSOLIDATED production compose file.
#
# Hand-authored merge of the former three-file prod stack:
#   deploy/docker-compose.yml            (base: pulse + ClickHouse)
#   deploy/docker-compose.hardened.yml   (container hardening, CH auth, limits,
#                                         mock-ams, pulse-migrate)
#   deploy/docker-compose.nginx-edge.yml (loopback-only host publishing)
# Verified equivalent via `docker compose config` diff at consolidation time —
# byte-identical rendered config, minus the retired containerised Caddy.
#
# EDGE. TLS is terminated by nginx ON THE HOST — not by anything in this file.
# Vhosts live in deploy/nginx/ (one server file per subdomain); the wildcard
# cert lives at /etc/letsencrypt/live/beyondkaira.com/ (certbot renews it).
# The app is published on the LOOPBACK interface only:
#
#     nginx (host) ──▶ 127.0.0.1:8090  UI + API   (upstream pulse_app)
#                  ──▶ 127.0.0.1:8091  beacon      (upstream pulse_beacon)
#                  ──▶ 127.0.0.1:8092  webhook     (upstream pulse_webhook)
#
# Bound to 127.0.0.1 ONLY — never 0.0.0.0 — so these ports are unreachable from
# the internet; only nginx, on the same host, can connect.
#
# BRING UP (prefer deploy/nginx/deployment.sh — it health-gates the private port):
#
#   sg docker -c 'docker compose -p pulse-prod \
#     -f deploy/docker-compose.prod.yml \
#     --env-file deploy/.env up -d --build'
#
# Production with a real AMS: add -f deploy/docker-compose.real-ams.yml.
# Backup sidecar: add -f deploy/docker-compose.backup.yml.
#
# Required env vars (put in deploy/.env — see deploy/.env.example):
#   PULSE_SECRET_KEY, CLICKHOUSE_USER, CLICKHOUSE_PASSWORD

name: pulse

services:

  # ── Pulse application ────────────────────────────────────────────────────────
  pulse:
    build:
      context: ..
      dockerfile: deploy/docker/pulse.Dockerfile
    expose:
      - "8090"    # UI + API
      - "8091"    # Beacon ingest
      - "8092"    # Webhook ingest — active when PULSE_WEBHOOK_SECRET is set
    # Loopback-only publishes for host-nginx (never 0.0.0.0 — see header).
    ports:
      - "127.0.0.1:8090:8090"   # UI + API + /healthz + WebSocket
      - "127.0.0.1:8091:8091"   # beacon ingest  (nginx /beacon/* , prefix stripped)
      - "127.0.0.1:8092:8092"   # AMS webhooks    (nginx /webhook/*)
    # ── Container hardening (S80/D-142) ──────────────────────────────────────
    # Defense-in-depth on the internet-facing app container (it parses untrusted
    # beacon + webhook input). The binary is a static (CGO_ENABLED=0) NON-root
    # process (USER pulse in the Dockerfile) that binds only high ports
    # (8090-8092, no NET_BIND_SERVICE needed) and writes exclusively to the
    # pulse-data volume, so it needs no Linux capabilities and no writable root
    # filesystem.
    #   - read_only: root fs is immutable; the /var/lib/pulse volume stays writable.
    #   - tmpfs /tmp: absorbs any transient temp write (e.g. modernc SQLite scratch).
    #   - cap_drop ALL: no capabilities are required.
    #   - no-new-privileges: block setuid/setgid privilege escalation.
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512m
          # 0.5 vCPU is enough since the O(N²) rebuildSnapshot hot path was
          # eliminated (S10/D-068 — incremental O(1)-per-event snapshots).
          cpus: "0.5"
    environment:
      # ── Core server ──────────────────────────────────────────────────────
      PULSE_LISTEN_ADDR: ":8090"
      # Dedicated beacon ingest listener — must match the 8091 publish above
      # and the nginx /beacon/* upstream (deploy/nginx/pulse.beyondkaira.com.conf).
      # Without it serve.go never binds 8091 and the public beacon URL 502s.
      PULSE_INGEST_LISTEN_ADDR: ":8091"
      PULSE_LOG_LEVEL: "info"

      # ── ClickHouse (authenticated) ───────────────────────────────────────
      PULSE_CLICKHOUSE_DSN: "clickhouse://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:9000/pulse"
      PULSE_CLICKHOUSE_DATABASE: "pulse"
      PULSE_RETENTION_DAYS: "90"
      PULSE_ROLLUP_TTL_DAYS: "395"

      # ── AMS source (mock by default; real-ams overlay overrides) ─────────
      PULSE_AMS_URL: "http://mock-ams:9090"
      PULSE_AMS_NODE_ID: "standalone"
      PULSE_POLL_INTERVAL: "5s"

      # ── Migrations / meta store ──────────────────────────────────────────
      PULSE_MIGRATIONS_DIR: "/contracts/db/clickhouse"
      PULSE_META_DDL_PATH: "/contracts/db/meta/0001_init.sql"
      PULSE_META_DSN: "/var/lib/pulse/pulse_meta.db"

      # ── Secrets (from deploy/.env — gitignored) ──────────────────────────
      PULSE_SECRET_KEY: "${PULSE_SECRET_KEY:-}"
      PULSE_WEBHOOK_ADDR: ":8092"
      PULSE_WEBHOOK_SECRET: "${PULSE_WEBHOOK_SECRET:-}"

      # ── Reports ──────────────────────────────────────────────────────────
      # Persist artifacts on the pulse-data volume (D-142/D-143): the code
      # default is RELATIVE and would land on the ephemeral container root —
      # wiped on redeploy AND incompatible with read_only above.
      PULSE_REPORTS_DIR: "/var/lib/pulse/reports"
    volumes:
      - pulse-data:/var/lib/pulse         # SQLite meta store + secret key + reports
      - ../contracts:/contracts:ro        # migration DDL for pulse + pulse-migrate
    depends_on:
      clickhouse:
        condition: service_healthy
      pulse-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/healthz"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 5
    restart: unless-stopped

  # ── ClickHouse with authentication ──────────────────────────────────────────
  clickhouse:
    # clickhouse/clickhouse-server:24.8
    # Digest pinned 2026-06-11 via registry HTTP API (no Docker daemon).
    # ⚠️ NEVER mount contracts/db/clickhouse/ as /docker-entrypoint-initdb.d/:
    # the DDL contains {db} placeholders that only the pulse-migrate runner
    # substitutes; raw ClickHouse aborts on the first statement (Code 62
    # SYNTAX_ERROR) and applies NO tables at all (D-065 WO-D). Schema is applied
    # exclusively by the pulse-migrate one-shot container.
    image: clickhouse/clickhouse-server@sha256:1d1f6508eba2dccce2cee9913907c5f7766327debc57a6b1991f2c9e3176c163
    environment:
      CLICKHOUSE_USER: "${CLICKHOUSE_USER}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD}"
      # CLICKHOUSE_SKIP_USER_SETUP must NOT be set here — auth must be enforced.
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    expose:
      - "9000"    # ClickHouse native protocol (cluster-internal only)
      - "8123"    # ClickHouse HTTP (cluster-internal only)
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"
    healthcheck:
      # Credentials required once auth is enabled.
      test: ["CMD", "clickhouse-client", "--user", "${CLICKHOUSE_USER}", "--password", "${CLICKHOUSE_PASSWORD}", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 12
    restart: unless-stopped

  # ── Mock AMS (self-contained; real-ams override replaces this) ───────────────
  mock-ams:
    # golang:1.25
    # Digest pinned 2026-07-09; to refresh: docker pull golang:1.25 && docker image inspect golang:1.25 --format '{{index .RepoDigests 0}}'
    image: golang@sha256:d7912cedddfa15b2900a8dfb7187df0af5ec2cb424a371139b5b352fd3e6b740
    working_dir: /src/qa/mock-ams
    command: ["go", "run", ".", "-addr", ":9090", "-app", "live"]
    volumes:
      - ../:/src:ro
      - go-build-cache:/root/.cache/go-build
    # Internal only — no host port; pulse reaches it via the default network.
    restart: unless-stopped

  # ── Schema migration one-shot ────────────────────────────────────────────────
  pulse-migrate:
    build:
      context: ..
      dockerfile: deploy/docker/pulse.Dockerfile
    entrypoint: ["pulse", "migrate"]
    environment:
      # Authenticated DSN — required once CLICKHOUSE_USER/PASSWORD are set.
      PULSE_CLICKHOUSE_DSN: "clickhouse://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:9000/pulse"
      PULSE_CLICKHOUSE_DATABASE: "pulse"
      PULSE_MIGRATIONS_DIR: "/contracts/db/clickhouse"
      PULSE_META_DSN: "/tmp/pulse_meta.db"
      # D-052 fail-closed guard: migrate refuses to boot without a >=16-byte key
      # (the scratch meta DSN above is non-:memory:, so the guard applies here too).
      PULSE_SECRET_KEY: "${PULSE_SECRET_KEY:-}"
    volumes:
      - ../contracts:/contracts:ro
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: "no"

volumes:
  pulse-data:
  clickhouse-data:
  go-build-cache:
